<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流光行動 POS 系統 - 專業進階版</title>
    
    <!-- iOS 網頁 App 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SILK POS">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9425/9425114.png">

    <!-- 外部資源庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Firebase SDK (v8 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overscroll-behavior: none; color: #1e293b; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #e0e7ff !important; }
        @media (display-mode: standalone) { nav { padding-top: 30px; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ========================================================
        // ⚠️ Firebase 配置驗證區 (專案 ID: my-pos-be7b2)
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDKj0O-cN9e4qQ0f7LTxNRutOjB-LUX5qk",
            authDomain: "my-pos-be7b2.firebaseapp.com",
            projectId: "my-pos-be7b2",
            storageBucket: "my-pos-be7b2.firebasestorage.app",
            messagingSenderId: "499859190156",
            appId: "1:499859190156:web:bcd8dbce13055b6c1e26a9",
            measurementId: "G-G76PVXEXPB"
        };
        
        const appId = 'pos-pro-v2-main';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        const getColl = (name) => {
            return db.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);
        };

        // --- UI 圖示 ---
        const IconEdit = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
        const IconTrash = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const IconGrip = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>);

        // --- 彈窗組件 ---
        const Modal = ({ title, children, onClose, wide = false }) => {
            useEffect(() => {
                const timer = setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 100);
                return () => clearTimeout(timer);
            }, []);
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm text-slate-800 font-sans">
                    <div className={`bg-white rounded-3xl shadow-2xl w-full ${wide ? 'max-w-4xl' : 'max-w-lg'} overflow-hidden flex flex-col max-h-[90vh]`}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50">
                            <h3 className="text-xl font-bold text-slate-700">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors"><i data-lucide="x" className="w-6 h-6"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ title, message, onConfirm, onCancel }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-md text-slate-800">
                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden p-8 text-center space-y-6 text-slate-800">
                    <div className="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto"><i data-lucide="alert-triangle" className="text-rose-500 w-10 h-10"></i></div>
                    <div className="space-y-2"><h3 className="text-2xl font-bold text-slate-800">{title || "確認刪除"}</h3><p className="text-slate-500">{message || "這項操作無法復原，您確定要繼續嗎？"}</p></div>
                    <div className="flex gap-4">
                        <button onClick={onCancel} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-slate-200 transition-all">取消</button>
                        <button onClick={onConfirm} className="flex-1 py-4 bg-rose-500 rounded-2xl font-bold text-white hover:bg-rose-600 shadow-lg shadow-rose-200 transition-all">確認</button>
                    </div>
                </div>
            </div>
        );

        const DraggableList = ({ items, onSorted, renderItem, component: Component = 'div', className = "" }) => {
            const listRef = useRef(null);
            useEffect(() => {
                if (!listRef.current || items.length === 0) return;
                const sortable = Sortable.create(listRef.current, {
                    animation: 150, ghostClass: 'sortable-ghost', handle: '.drag-handle',
                    onEnd: (evt) => {
                        const { oldIndex, newIndex } = evt;
                        if (oldIndex === newIndex) return;
                        const newItems = [...items];
                        const [moved] = newItems.splice(oldIndex, 1);
                        newItems.splice(newIndex, 0, moved);
                        onSorted(newItems);
                    }
                });
                return () => sortable.destroy();
            }, [items, onSorted]);
            return <Component ref={listRef} className={className}>{items.map((item, idx) => renderItem(item, idx))}</Component>;
        };

        // --- 結帳處理邏輯 (加回折扣功能並新增日期選擇) ---
        const CheckoutModal = ({ cart, subtotal, staffs, discounts, payments, onClose, onSuccess, type = "SALE" }) => {
            const [selectedStaff, setSelectedStaff] = useState('');
            const [selectedDiscount, setSelectedDiscount] = useState(null);
            const [selectedPayment, setSelectedPayment] = useState('');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]); // 預設今天
            const [notes, setNotes] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const isSale = type === "SALE";

            const finalPrice = useMemo(() => {
                if (!isSale || !selectedDiscount) return subtotal;
                if (selectedDiscount.type === 'percent') return Math.round(subtotal * (1 - selectedDiscount.value / 100));
                return Math.max(0, subtotal - (selectedDiscount.value || 0));
            }, [subtotal, selectedDiscount, isSale]);

            const handleCheckout = async () => {
                if (!selectedStaff || (isSale && !selectedPayment)) return;
                setIsSubmitting(true);
                try {
                    const batch = db.batch();
                    const orderNo = `${isSale ? 'ORD' : 'PUR'}-${Date.now()}`;
                    const transRef = getColl('transactions').doc();
                    
                    // 將選取的日期字串轉為 Firebase Timestamp (設為該日凌晨 00:00:00)
                    const timestamp = firebase.firestore.Timestamp.fromDate(new Date(selectedDate));

                    batch.set(transRef, {
                        orderNo, type, items: cart, subtotal, 
                        discountName: isSale ? (selectedDiscount?.name || '無') : '-',
                        discountValue: isSale ? (selectedDiscount?.value || 0) : 0,
                        discountType: isSale ? (selectedDiscount?.type || 'amount') : '-',
                        finalPrice, staff: selectedStaff,
                        payment: isSale ? selectedPayment : '無', 
                        notes, timestamp: timestamp,
                        searchText: `${orderNo} ${selectedStaff} ${isSale ? selectedPayment : ''} ${notes} ${cart.map(i => i.name).join(' ')} ${isSale ? '銷售' : '進貨'}`.toLowerCase()
                    });
                    for (const item of cart) {
                        const increment = isSale ? -item.qty : item.qty;
                        batch.update(getColl('inventory').doc(item.id), { count: firebase.firestore.FieldValue.increment(increment) });
                    }
                    await batch.commit();
                    onSuccess();
                } catch (err) { console.error(err); } finally { setIsSubmitting(false); }
            };

            return (
                <Modal title={isSale ? "訂單結帳詳情" : "入庫確認系統"} onClose={onClose}>
                    <div className="space-y-6 text-slate-800">
                        {/* 日期選擇 */}
                        <div>
                            <label className="block text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">銷售日期 (僅年月日)</label>
                            <input type="date" className="w-full p-4 rounded-xl border bg-white font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                        </div>

                        <div className={`grid ${isSale ? 'grid-cols-2' : 'grid-cols-1'} gap-4`}>
                            <div><label className="block text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">經手人員</label><select className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" value={selectedStaff} onChange={e => setSelectedStaff(e.target.value)}><option value="">選擇人員</option>{staffs.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select></div>
                            {isSale && (<div><label className="block text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">收款方式</label><select className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" value={selectedPayment} onChange={e => setSelectedPayment(e.target.value)}><option value="">收款方式</option>{payments.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}</select></div>)}
                        </div>

                        {isSale && (
                            <div><label className="block text-xs font-black text-slate-400 mb-2 uppercase tracking-widest">折扣選項</label>
                                <div className="flex flex-wrap gap-2">
                                    <button onClick={() => setSelectedDiscount(null)} className={`px-4 py-2 rounded-xl text-sm border font-bold transition-all ${!selectedDiscount ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-200'}`}>不打折</button>
                                    {discounts.map(d => (<button key={d.id} onClick={() => setSelectedDiscount(d)} className={`px-4 py-2 rounded-xl text-sm border font-bold transition-all ${selectedDiscount?.id === d.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-200'}`}>{d.name} {d.type === 'percent' ? `(${d.value}%)` : `(-$${d.value})`}</button>))}
                                </div>
                            </div>
                        )}
                        <div><label className="block text-xs font-black text-slate-400 mb-1 uppercase tracking-widest">備註備忘</label><textarea className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" rows="2" placeholder="輸入備註..." value={notes} onChange={e => setNotes(e.target.value)}></textarea></div>
                        {isSale && (<div className="p-6 rounded-[2rem] text-center bg-indigo-50 border-2 border-indigo-100 shadow-sm"><p className="text-xs font-black text-slate-400 mb-1 uppercase tracking-tighter">應收總計</p><span className="text-5xl font-black text-indigo-700 tracking-tighter">${finalPrice}</span></div>)}
                        <button disabled={!selectedStaff || (isSale && !selectedPayment) || isSubmitting} onClick={handleCheckout} className={`w-full py-5 rounded-2xl font-black shadow-xl text-white transition-all transform active:scale-95 ${isSale ? 'bg-indigo-600 hover:bg-indigo-700 shadow-indigo-100' : 'bg-emerald-600 hover:bg-emerald-700 shadow-emerald-100'}`}>{isSubmitting ? '儲存中...' : (isSale ? '確認完成結帳' : '確認完成入庫')}</button>
                    </div>
                </Modal>
            );
        };

        // --- 銷售模組 (SalesView) ---
        const SalesView = ({ products, inventory, cart, setCart, staffs, discounts, payments, tags }) => {
            const [search, setSearch] = useState('');
            const [barcodeInput, setBarcodeInput] = useState('');
            const [selectedTag, setSelectedTag] = useState('全部');
            const [showCheckout, setShowCheckout] = useState(false);
            const [priceModal, setPriceModal] = useState(null);
            const barcodeInputRef = useRef(null);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchSearch = p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode || '').includes(search);
                    const matchTag = selectedTag === '全部' || p.tags?.includes(selectedTag);
                    return matchSearch && matchTag;
                });
            }, [products, search, selectedTag]);

            const addToCart = (product, option) => {
                if ((inventory[product.id] || 0) < 1) return;
                const cartId = `${product.id}-${option.label}`;
                const existing = cart.find(item => item.cartId === cartId);
                if (existing) setCart(cart.map(item => item.cartId === cartId ? {...item, qty: item.qty + 1} : item));
                else setCart([...cart, { ...product, ...option, qty: 1, cartId }]);
                setPriceModal(null);
                setBarcodeInput('');
                setTimeout(() => barcodeInputRef.current?.focus(), 100);
            };

            const handleBarcodeScan = (e) => {
                if (e.key === 'Enter') {
                    const code = barcodeInput.trim();
                    const product = products.find(p => p.barcode === code);
                    if (product && (inventory[product.id] || 0) >= 1) {
                        if (product.options?.length === 1) addToCart(product, product.options[0]);
                        else setPriceModal(product);
                    }
                    setBarcodeInput('');
                }
            };

            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            return (
                <div className="h-full flex flex-col lg:flex-row overflow-hidden">
                    <div className="flex-1 flex flex-col p-4 lg:p-8 space-y-6 overflow-y-auto scrollbar-hide">
                        <header className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="relative"><i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input type="text" placeholder="快速搜尋..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-sm outline-none font-bold" value={search} onChange={e => setSearch(e.target.value)} /></div>
                            <div className="relative"><i data-lucide="barcode" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-indigo-500"></i><input ref={barcodeInputRef} type="text" placeholder="掃描條碼區..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-indigo-100 bg-indigo-50/30 focus:border-indigo-500 outline-none font-black shadow-inner" value={barcodeInput} onChange={e => setBarcodeInput(e.target.value)} onKeyDown={handleBarcodeScan} autoFocus /></div>
                        </header>
                        <div className="flex overflow-x-auto space-x-2 pb-2 scrollbar-hide">
                            <button onClick={() => setSelectedTag('全部')} className={`px-5 py-2 rounded-full transition-all shrink-0 font-black tracking-tight ${selectedTag === '全部' ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border'}`}>全部</button>
                            {tags.map(t => (<button key={t.id} onClick={() => setSelectedTag(t.name)} className={`px-5 py-2 rounded-full transition-all shrink-0 font-black tracking-tight ${selectedTag === t.name ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border'}`}>{t.name}</button>))}
                        </div>
                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4 pb-8">
                            {filteredProducts.map(p => {
                                const stock = inventory[p.id] || 0;
                                const isOutOfStock = stock < 1;
                                return (
                                    <div key={p.id} onClick={() => !isOutOfStock && setPriceModal(p)} className={`bg-white p-4 rounded-[2rem] border shadow-sm transition-all cursor-pointer group flex flex-col ${isOutOfStock ? 'opacity-40 grayscale-[0.3]' : 'hover:shadow-md'}`}>
                                        <div className="w-full aspect-square rounded-3xl overflow-hidden bg-slate-100 mb-3 shadow-inner">{p.imageUrl ? <img src={p.imageUrl} alt={p.name} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><i data-lucide="image" className="w-10 h-10"></i></div>}</div>
                                        <div className="flex-1 flex flex-col justify-between">
                                            <div><div className="flex justify-between items-start mb-1"><span className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{p.barcode || '無碼'}</span><span className={`text-[10px] font-black px-2 py-0.5 rounded-md ${isOutOfStock ? 'bg-rose-50 text-rose-500' : 'bg-indigo-50 text-indigo-500'}`}>庫存: {stock}</span></div><h4 className={`font-black text-base line-clamp-1 ${isOutOfStock ? 'text-slate-400' : 'text-slate-700'}`}>{p.name}</h4></div>
                                            <div className="flex justify-between items-end mt-2"><div className={`font-black text-xl ${isOutOfStock ? 'text-slate-400' : 'text-indigo-600'}`}>${p.options?.[0]?.price || 0}</div>{!isOutOfStock && <div className="bg-slate-100 p-2 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors shadow-sm"><i data-lucide="plus" className="w-4 h-4"></i></div>}</div>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>
                    {/* 購物籃 */}
                    <div className="w-full lg:w-96 bg-white border-l flex flex-col shadow-2xl z-30">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50/50 font-black tracking-widest uppercase"><h2 className="text-xl flex items-center text-slate-700 tracking-tighter"><i data-lucide="shopping-bag" className="w-5 h-5 mr-2 text-indigo-600"></i>購物籃</h2><button onClick={() => setCart([])} className="text-xs font-bold text-rose-500 hover:underline">清空</button></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                            {cart.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 p-8 text-center opacity-40 font-black"><i data-lucide="shopping-cart" className="w-16 h-16"></i><p>尚未掃描商品</p></div> : 
                            cart.map((item) => (
                                <div key={item.cartId} className="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 animate-in slide-in-from-right duration-300">
                                    <div className="flex-1"><p className="font-black text-slate-700 leading-tight">{item.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{item.label}</p><p className="text-indigo-600 font-black mt-1 text-lg">${item.price}</p></div>
                                    <div className="flex items-center bg-white rounded-xl border p-1 shadow-sm">
                                        <button onClick={() => { if(item.qty > 1) setCart(cart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty - 1} : c)); else setCart(cart.filter(c => c.cartId !== item.cartId)); }} className="p-1 text-rose-400 active:scale-75 transition-transform"><i data-lucide="minus-circle" className="w-5 h-5"></i></button>
                                        <span className="w-8 text-center font-black">{item.qty}</span>
                                        <button onClick={() => { if(inventory[item.id] > item.qty) setCart(cart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty + 1} : c)); }} className="p-1 text-emerald-500 active:scale-75 transition-transform"><i data-lucide="plus-circle" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-6 border-t bg-slate-50 space-y-4 shadow-inner">
                            <div className="flex justify-between items-center"><span className="text-slate-500 font-black text-sm uppercase tracking-widest">總計金額</span><span className="font-black text-4xl text-slate-800 tracking-tighter">${subtotal}</span></div>
                            <button disabled={cart.length === 0} onClick={() => setShowCheckout(true)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-700 disabled:opacity-50 transition-all flex items-center justify-center space-x-3 transform active:scale-95"><span>確認結帳</span><i data-lucide="chevron-right" className="w-6 h-6"></i></button>
                        </div>
                    </div>
                    {priceModal && (<Modal title={`規格選擇 - ${priceModal.name}`} onClose={() => setPriceModal(null)}><div className="grid grid-cols-1 gap-3 font-bold">{priceModal.options.map((opt, i) => (<button key={i} onClick={() => addToCart(priceModal, opt)} className="flex justify-between items-center p-5 bg-slate-50 hover:bg-indigo-50 border rounded-2xl transition-all shadow-sm active:scale-[0.98]"><span className="text-slate-700">{opt.label}</span><span className="text-indigo-600 font-black text-xl">${opt.price}</span></button>)) }</div></Modal>)}
                    {showCheckout && <CheckoutModal cart={cart} subtotal={subtotal} staffs={staffs} discounts={discounts} payments={payments} onClose={() => setShowCheckout(false)} onSuccess={() => { setShowCheckout(false); setCart([]); }} type="SALE" />}
                </div>
            );
        };

        // --- 庫存與進貨視圖 ---
        const InventoryView = ({ products, inventory, tags, staffs, payments }) => {
            const [selectedTag, setSelectedTag] = useState('全部');
            const [adjusting, setAdjusting] = useState(null);
            const [inboundCart, setInboundCart] = useState([]);
            const [showInboundCheckout, setShowInboundCheckout] = useState(false);
            const filteredProducts = products.filter(p => selectedTag === '全部' || p.tags?.includes(selectedTag));

            const handleQuickAdjust = async (product, type, value) => {
                if (isNaN(value) || value === "") return;
                const num = parseInt(value);
                const invRef = getColl('inventory').doc(product.id);
                let change = type === 'IN' ? num : type === 'OUT' ? -num : num - (inventory[product.id] || 0);
                await invRef.set({ count: firebase.firestore.FieldValue.increment(change) }, { merge: true });
                setAdjusting(null);
            };

            const addToInbound = (product, option) => {
                const cartId = `${product.id}-${option.label}`;
                const existing = inboundCart.find(item => item.cartId === cartId);
                if (existing) setInboundCart(inboundCart.map(item => item.cartId === cartId ? {...item, qty: item.qty + 1} : item));
                else setInboundCart([...inboundCart, { ...product, ...option, qty: 1, cartId }]);
            };

            return (
                <div className="h-full flex flex-col lg:flex-row overflow-hidden font-sans">
                    <div className="flex-1 p-4 lg:p-8 space-y-6 overflow-y-auto scrollbar-hide">
                        <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><h2 className="text-2xl font-black text-slate-800 tracking-tight">庫存與批次進貨管理</h2><select className="p-2 rounded-xl border bg-white outline-none font-black" value={selectedTag} onChange={e => setSelectedTag(e.target.value)}><option value="全部">全部商品</option>{tags.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}</select></header>
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 pb-20">
                            {filteredProducts.map(p => (
                                <div key={p.id} className="bg-white p-5 rounded-[2rem] border shadow-sm hover:border-indigo-100 transition-all group">
                                    <div className="flex justify-between items-start mb-4 text-slate-800">
                                        <div className="flex gap-4"><div className="w-14 h-14 rounded-2xl bg-slate-100 overflow-hidden shrink-0 shadow-inner">{p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <i data-lucide="image" className="w-6 h-6 m-4 text-slate-300"></i>}</div><div><h4 className="font-black text-slate-700 line-clamp-1">{p.name}</h4><p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{p.barcode || '-'}</p></div></div>
                                        <span className={`px-4 py-2 rounded-full text-sm font-black shadow-sm ${inventory[p.id] <= 5 ? 'bg-rose-50 text-rose-500 border border-rose-100' : 'bg-emerald-50 text-emerald-500 border border-emerald-100'}`}>{inventory[p.id] || 0}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        <button onClick={() => setAdjusting({product: p, type: 'IN'})} className="bg-slate-50 text-slate-600 py-3 rounded-2xl text-xs font-black hover:bg-white transition-all border hover:border-indigo-100 uppercase tracking-widest">快速入庫</button>
                                        <button onClick={() => setAdjusting({product: p, type: 'SET'})} className="bg-slate-50 text-slate-600 py-3 rounded-2xl text-xs font-black hover:bg-white transition-all border hover:border-indigo-100 uppercase tracking-widest">盤點校正</button>
                                    </div>
                                    <button onClick={() => p.options.length === 1 ? addToInbound(p, p.options[0]) : setAdjusting({product: p, type: 'SELECT_INBOUND'})} className="w-full bg-emerald-50 text-emerald-600 py-3 rounded-2xl text-xs font-black hover:bg-emerald-100 flex items-center justify-center gap-2 transition-all border border-emerald-100 uppercase tracking-widest"><i data-lucide="plus-circle" className="w-4 h-4"></i>加入批次進貨單</button>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full lg:w-96 bg-white border-l flex flex-col shadow-2xl">
                        <div className="p-6 border-b flex justify-between items-center bg-emerald-50/20 text-emerald-700 font-black tracking-tighter uppercase"><h2 className="text-xl flex items-center"><i data-lucide="truck" className="w-5 h-5 mr-2"></i>批次進貨單</h2><button onClick={() => setInboundCart([])} className="text-[10px] font-black text-rose-500 hover:underline tracking-tighter">清空內容</button></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide">
                            {inboundCart.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 text-center p-8 opacity-40 font-black"><i data-lucide="clipboard-list" className="w-16 h-16"></i><p>目前清單為空</p></div> : 
                            inboundCart.map((item) => (
                                <div key={item.cartId} className="flex items-center space-x-4 bg-emerald-50/10 p-4 rounded-3xl border border-emerald-50 shadow-sm animate-in slide-in-from-bottom duration-300">
                                    <div className="flex-1"><p className="font-black text-slate-700 leading-none mb-1">{item.name}</p><p className="text-[10px] text-slate-400 font-black uppercase">{item.label}</p><p className="text-emerald-600 font-black mt-1 text-lg">${item.price}</p></div>
                                    <div className="flex items-center bg-white rounded-xl border p-1 shadow-sm">
                                        <button onClick={() => { if(item.qty > 1) setInboundCart(inboundCart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty - 1} : c)); else setInboundCart(inboundCart.filter(c => c.cartId !== item.cartId)); }} className="p-1 text-rose-400 active:scale-75 transition-transform"><i data-lucide="minus-circle" className="w-5 h-5"></i></button>
                                        <span className="w-8 text-center font-black">{item.qty}</span>
                                        <button onClick={() => setInboundCart(inboundCart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty + 1} : c))} className="p-1 text-emerald-500 active:scale-75 transition-transform"><i data-lucide="plus-circle" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            )) }
                        </div>
                        <div className="p-6 border-t bg-slate-50 shadow-inner"><button disabled={inboundCart.length === 0} onClick={() => setShowInboundCheckout(true)} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center space-x-3 transform active:scale-95"><span>確認完成進貨</span><i data-lucide="check-circle" className="w-6 h-6"></i></button></div>
                    </div>
                    {/* 快速調整彈窗 */}
                    {adjusting?.type === 'SELECT_INBOUND' && (
                        <Modal title={`規格選擇 - ${adjusting.product.name}`} onClose={() => setAdjusting(null)}>
                            <div className="grid grid-cols-1 gap-2 font-bold">{adjusting.product.options.map((opt, i) => (<button key={i} onClick={() => { addToInbound(adjusting.product, opt); setAdjusting(null); }} className="p-5 bg-slate-50 rounded-2xl text-left hover:bg-emerald-50 transition-colors flex justify-between shadow-sm border active:scale-[0.98]"><span className="text-slate-700">{opt.label}</span><span className="text-emerald-600 font-black text-xl">${opt.price}</span></button>)) }</div>
                        </Modal>
                    )}
                    {adjusting && adjusting.type !== 'SELECT_INBOUND' && (
                        <Modal title={`${adjusting.type === 'IN' ? '庫存入庫' : '盤點校正'} - ${adjusting.product.name}`} onClose={() => setAdjusting(null)}>
                            <div className="space-y-6 text-center">
                                <div className="p-4 bg-slate-50 rounded-2xl border text-xs font-black text-slate-400 uppercase tracking-widest">當前庫存量: {inventory[adjusting.product.id] || 0}</div>
                                <input type="number" autoFocus placeholder="..." className="w-full p-6 rounded-3xl bg-slate-100 text-center text-6xl font-black outline-none border-4 border-indigo-200 shadow-inner focus:border-indigo-500 transition-colors" onKeyDown={e => e.key === 'Enter' && handleQuickAdjust(adjusting.product, adjusting.type, e.target.value)} />
                                <button onClick={e => handleQuickAdjust(adjusting.product, adjusting.type, e.currentTarget.previousSibling.value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 active:scale-95 transition-all">確認變更</button>
                            </div>
                        </Modal>
                    )}
                    {showInboundCheckout && (<CheckoutModal cart={inboundCart} subtotal={0} staffs={staffs} payments={payments} onClose={() => setShowInboundCheckout(false)} onSuccess={() => { setShowInboundCheckout(false); setInboundCart([]); }} type="PURCHASE" />)}
                </div>
            );
        };

        const HistoryView = () => {
            const [orders, setOrders] = useState([]);
            const [search, setSearch] = useState('');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);

            useEffect(() => {
                const fetch = async () => {
                    const snap = await getColl('transactions').get();
                    setOrders(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
                };
                fetch();
            }, []);

            const filteredOrders = useMemo(() => {
                return orders.filter(o => {
                    // 根據日期字串進行簡易年月日篩選 (YYYY-MM-DD)
                    const d = o.timestamp?.toDate ? o.timestamp.toDate().toISOString().split('T')[0] : '';
                    return (d >= startDate && d <= endDate) && (!search || o.searchText?.includes(search.toLowerCase()));
                }).sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0));
            }, [orders, search, startDate, endDate]);

            const exportToXlsx = () => {
                const data = filteredOrders.map(o => ({ '訂單編號': o.orderNo, '交易類型': o.type, '交易日期': o.timestamp?.toDate().toISOString().split('T')[0], '結算總額': o.finalPrice, '經手人': o.staff, '付款方式': o.payment, '折扣方案': o.discountName, '備註': o.notes || "" }));
                const ws = XLSX.utils.json_to_sheet(data);
                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws, "銷售報表");
                XLSX.writeFile(wb, `POS銷售報表_${startDate}.xlsx`);
            };

            return (
                <div className="p-4 lg:p-8 space-y-6 pb-20 scrollbar-hide overflow-y-auto h-full font-sans">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4"><h2 className="text-2xl font-black text-slate-800 tracking-tight uppercase">歷史銷售報表</h2><div className="flex gap-2"><div className="flex bg-white border rounded-xl shadow-sm overflow-hidden"><input type="date" className="p-2 text-xs font-bold outline-none" value={startDate} onChange={e => setStartDate(e.target.value)} /><input type="date" className="p-2 text-xs font-bold border-l outline-none" value={endDate} onChange={e => setEndDate(e.target.value)} /></div><button onClick={exportToXlsx} className="bg-emerald-600 text-white px-5 py-3 rounded-xl font-black text-xs shadow-lg uppercase tracking-widest hover:bg-emerald-700 transition-all transform active:scale-95"><i data-lucide="file-spreadsheet" className="w-4 h-4 mr-1"></i>匯出報表</button></div></header>
                    <div className="relative"><i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input className="w-full pl-12 p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold outline-none bg-white shadow-sm focus:ring-2 focus:ring-indigo-500 transition-all" placeholder="搜尋訂單、人員或備註..." value={search} onChange={e => setSearch(e.target.value)} /></div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filteredOrders.map(o => (
                            <div key={o.id} className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4 relative overflow-hidden group hover:border-indigo-100 transition-all animate-in fade-in duration-500 text-slate-800">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black uppercase text-white shadow-md ${o.type === 'PURCHASE' ? 'bg-emerald-500' : 'bg-indigo-500'}`}>{o.type === 'SALE' ? '銷售訂單' : '進貨單'}</div>
                                <div className="border-b border-slate-50 pb-3 font-bold"><p className="text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">{o.orderNo}</p><h4 className="font-black text-slate-700 leading-none text-lg">{o.timestamp?.toDate().toISOString().split('T')[0]}</h4></div>
                                <div className="space-y-2">{o.items.map((it, i) => <div key={i} className="flex justify-between text-xs font-bold"><span className="text-slate-500">{it.name} <span className="opacity-40 uppercase text-[8px] font-black">({it.label})</span> <span className="text-indigo-600 font-black ml-1">x{it.qty}</span></span><span className="text-slate-800 font-black">${it.price * it.qty}</span></div>)}</div>
                                <div className="bg-slate-50 p-4 rounded-2xl flex justify-between items-end border border-slate-100 shadow-inner"><div className="space-y-1"><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">經手: {o.staff}</p><p className="text-[9px] font-black text-slate-400 uppercase tracking-widest">收款: {o.payment} | 折扣: {o.discountName}</p></div><span className="text-2xl text-indigo-600 font-black tracking-tighter leading-none">${o.finalPrice}</span></div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const SettingsView = ({ staffs, discounts, payments, tags, products, setConfirmState }) => {
            const [productModal, setProductModal] = useState({ open: false, item: null });
            
            const SettingBlock = ({ title, data, coll, icon }) => {
                const [newVal, setNewVal] = useState('');
                const [newNum, setNewNum] = useState(0);
                const [newType, setNewType] = useState('amount');
                const isDiscount = coll === 'settings_discounts';

                const add = async () => {
                    if (!newVal) return;
                    await getColl(coll).add({ name: newVal, value: newNum, type: isDiscount ? newType : null, order: data.length });
                    setNewVal(''); setNewNum(0);
                };

                return (
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4">
                        <div className="flex items-center gap-2 mb-2 text-indigo-600 font-black"><i data-lucide={icon} className="w-5 h-5"></i><h3>{title}</h3></div>
                        <DraggableList items={data} onSorted={async (list) => { const b = db.batch(); list.forEach((it, i) => b.update(getColl(coll).doc(it.id), { order: i })); await b.commit(); }} renderItem={(it) => (
                            <div key={it.id} className="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border group hover:border-indigo-100 hover:bg-white transition-all mb-2">
                                <div className="flex items-center gap-2"><div className="drag-handle text-slate-300 transition-colors hover:text-indigo-400 p-1"><IconGrip /></div><span className="text-sm font-bold text-slate-600">{it.name} {isDiscount && (it.type === 'percent' ? `(${it.value}%)` : `(-$${it.value})`)}</span></div>
                                <button onClick={() => getColl(coll).doc(it.id).delete()} className="text-rose-200 hover:text-rose-500 opacity-0 group-hover:opacity-100 transition-all p-1 active:scale-75"><IconTrash /></button>
                            </div>
                        )} />
                        <div className="flex flex-col gap-2 pt-2 border-t border-slate-50">
                            <div className="flex gap-2"><input className="flex-1 p-3 rounded-xl border bg-slate-50 text-sm font-bold outline-none" placeholder="輸入名稱" value={newVal} onChange={e => setNewVal(e.target.value)} />{isDiscount && (<select className="p-3 rounded-xl border bg-slate-50 text-xs font-bold" value={newType} onChange={e => setNewType(e.target.value)}><option value="amount">固定金額</option><option value="percent">比例(%)</option></select>)}</div>
                            <div className="flex gap-2">{isDiscount && <input type="number" className="flex-1 p-3 rounded-xl border bg-slate-50 text-sm font-bold outline-none" placeholder="數值" value={newNum} onChange={e => setNewNum(parseInt(e.target.value) || 0)} />}<button onClick={add} className="bg-indigo-600 text-white px-4 rounded-xl shadow-md active:scale-95 transition-transform"><i data-lucide="plus" className="w-5 h-5"></i></button></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="p-4 lg:p-8 space-y-8 pb-20 scrollbar-hide overflow-y-auto h-full font-sans">
                    <div className="flex justify-between items-center"><h2 className="text-2xl font-black text-slate-800 tracking-tight">系統營運設定</h2><button onClick={() => setProductModal({ open: true, item: null })} className="bg-indigo-600 text-white px-6 py-4 rounded-[2rem] font-black flex items-center gap-2 shadow-xl hover:bg-indigo-700 transition-all scale-105 active:scale-95 uppercase tracking-widest"><i data-lucide="plus" className="w-6 h-6"></i>新增商品</button></div>
                    <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden">
                        <table className="w-full text-left border-collapse">
                            <thead className="bg-slate-50/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b font-sans"><tr><th className="px-6 py-5 w-16 text-center">排序</th><th className="px-6 py-5">商品清單</th><th className="px-6 py-5">操作</th></tr></thead>
                            <DraggableList component="tbody" items={products} onSorted={async (list) => { const b = db.batch(); list.forEach((p, i) => b.update(getColl('products').doc(p.id), { order: i })); await b.commit(); }} renderItem={(p) => (
                                <tr key={p.id} className="hover:bg-slate-50 group border-b transition-colors">
                                    <td className="px-6 py-5 text-center"><div className="drag-handle text-slate-300 hover:text-indigo-400 p-2 inline-block transition-colors"><IconGrip /></div></td>
                                    <td className="px-6 py-5 font-black text-slate-700 font-sans">{p.name}</td>
                                    <td className="px-6 py-5 text-right font-sans"><div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-all"><button onClick={() => setProductModal({ open: true, item: p })} className="p-2 text-indigo-400 hover:bg-white rounded-xl shadow-sm border"><IconEdit /></button><button onClick={() => { getColl('products').doc(p.id).delete(); getColl('inventory').doc(p.id).delete(); }} className="p-2 text-rose-300 hover:bg-white hover:text-rose-500 rounded-xl shadow-sm border"><IconTrash /></button></div></td>
                                </tr>
                            )} />
                        </table>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20">
                        <SettingBlock title="服務人員管理" data={staffs} coll="settings_staff" icon="users" />
                        <SettingBlock title="付款方式管理" data={payments} coll="settings_payments" icon="credit-card" />
                        <SettingBlock title="折扣方案管理" data={discounts} coll="settings_discounts" icon="percent" />
                        <SettingBlock title="商品分類標籤" data={tags} coll="settings_tags" icon="tag" />
                    </div>
                    {productModal.open && <ProductEditor tags={tags} productToEdit={productModal.item} onClose={() => setProductModal({ open: false, item: null })} />}
                </div>
            );
        };

        const ProductEditor = ({ tags, productToEdit, onClose }) => {
            const [name, setName] = useState(productToEdit?.name || '');
            const [barcode, setBarcode] = useState(productToEdit?.barcode || '');
            const [options, setOptions] = useState(productToEdit?.options || [{ label: '原價', price: 0 }]);
            const [selTags, setSelTags] = useState(productToEdit?.tags || []);
            const [isSaving, setIsSaving] = useState(false);

            const save = async () => {
                if (!name) return;
                setIsSaving(true);
                const data = { name, barcode, options, tags: selTags, updatedAt: firebase.firestore.FieldValue.serverTimestamp() };
                if (productToEdit) { await getColl('products').doc(productToEdit.id).update(data); }
                else { const ref = getColl('products').doc(); data.order = 999; await ref.set(data); await getColl('inventory').doc(ref.id).set({ count: 0 }); }
                onClose();
            };

            return (
                <Modal title={productToEdit ? "修改系統商品" : "建立新商品項目"} onClose={onClose} wide={true}>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 font-bold text-slate-800 font-sans">
                        <div className="space-y-5">
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">商品名稱</label><input className="w-full p-4 rounded-2xl border bg-slate-50 outline-none shadow-inner font-bold" value={name} onChange={e => setName(e.target.value)} /></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">條碼代號</label><input className="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-mono shadow-inner font-black" value={barcode} onChange={e => setBarcode(e.target.value)} /></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">標籤分類</label><div className="flex flex-wrap gap-2 mt-2">{tags.map(t => <button key={t.id} onClick={() => selTags.includes(t.name) ? setSelTags(selTags.filter(x => x !== t.name)) : setSelTags([...selTags, t.name])} className={`px-4 py-2 rounded-xl text-[10px] border transition-all font-black uppercase ${selTags.includes(t.name) ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-200'}`}>{t.name}</button>)}</div></div>
                        </div>
                        <div className="space-y-5">
                            <div className="flex justify-between items-center"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">規格售價清單</label><button onClick={() => setOptions([...options, {label: '', price: 0}])} className="text-xs text-indigo-600 font-black hover:underline uppercase tracking-widest">+ 新增規格</button></div>
                            <div className="space-y-2 max-h-[250px] overflow-y-auto pr-2 scrollbar-hide">
                                {options.map((opt, i) => (
                                    <div key={i} className="flex gap-2"><input className="flex-1 p-3 rounded-2xl border bg-slate-50 outline-none text-sm font-bold shadow-sm" placeholder="規格名稱" value={opt.label} onChange={e => { const n = [...options]; n[i].label = e.target.value; setOptions(n); }} /><input type="number" className="w-24 p-3 rounded-2xl border bg-slate-50 outline-none text-sm font-bold shadow-sm" placeholder="售價" value={opt.price} onChange={e => { const n = [...options]; n[i].price = parseInt(e.target.value) || 0; setOptions(n); }} /></div>
                                ))}
                            </div>
                            <button disabled={isSaving} onClick={save} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black shadow-xl hover:bg-indigo-700 disabled:opacity-50 transition-all transform active:scale-95 uppercase tracking-widest">{isSaving ? '儲存中...' : '確認儲存商品資料'}</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const App = () => {
            const [view, setView] = useState('sales');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [dbError, setDbError] = useState(null);
            const [confirmState, setConfirmState] = useState(null);
            const [products, setProducts] = useState([]);
            const [inventory, setInventory] = useState({});
            const [staffs, setStaffs] = useState([]);
            const [discounts, setDiscounts] = useState([]);
            const [payments, setPayments] = useState([]);
            const [tags, setTags] = useState([]);
            const [cart, setCart] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try { await auth.signInAnonymously(); } catch (err) {
                        if (err.message?.includes('CONFIGURATION_NOT_FOUND')) setAuthError("身分驗證尚未開啟：請前往 Firebase -> Build -> Authentication -> Sign-in method 啟用 'Anonymous'。");
                        else setAuthError(`連線錯誤: ${err.message}`);
                    } finally { setLoading(false); }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => { setUser(u); if(u) lucide.createIcons(); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const logErr = (name) => (err) => { if (err.message?.includes('database (default) does not exist')) setDbError("資料庫尚未建立：請前往 Firebase Console -> Firestore Database 點擊「建立資料庫」。"); };
                const unsubs = [
                    getColl('products').onSnapshot(s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0))), logErr('產品資料')),
                    getColl('inventory').onSnapshot(s => { const i = {}; s.docs.forEach(d => i[d.id] = d.data().count||0); setInventory(i); }),
                    getColl('settings_staff').onSnapshot(s => setStaffs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_payments').onSnapshot(s => setPayments(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_tags').onSnapshot(s => setTags(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_discounts').onSnapshot(s => setDiscounts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            useEffect(() => { if (!loading) lucide.createIcons(); }, [view, loading, cart]);

            if (authError || dbError) return (<div className="h-screen flex items-center justify-center p-8 bg-slate-50"><div className="max-w-md w-full bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-rose-500 text-center space-y-8 animate-in zoom-in duration-300"><div className="w-24 h-24 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto shadow-sm"><i data-lucide="shield-alert" className="w-12 h-12"></i></div><h2 className="text-3xl font-black text-slate-800 tracking-tighter">系統連線不成功</h2><p className="text-slate-500 leading-relaxed font-medium">{authError || dbError}</p><div className="pt-4"><a href="https://console.firebase.google.com/" target="_blank" className="inline-block px-10 py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 transition-all transform active:scale-95 uppercase tracking-widest">前往設定頁面</a></div></div></div>);
            if (loading) return (<div className="fixed inset-0 flex items-center justify-center bg-white z-50 text-center animate-pulse"><div className="space-y-6"><div className="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto shadow-sm"></div><p className="text-slate-400 font-black tracking-widest uppercase text-[10px] tracking-widest">正在安全同步數據...</p></div></div>);

            return (
                <div className="min-h-screen h-screen flex flex-col md:flex-row bg-slate-50 text-slate-800 overflow-hidden font-sans">
                    <nav className="fixed bottom-0 left-0 right-0 md:relative md:w-20 lg:w-64 bg-white border-t md:border-t-0 md:border-r z-40 flex md:flex-col items-center py-2 md:py-8 shadow-2xl md:shadow-none">
                        <div className="hidden lg:block mb-10 px-6 w-full text-center font-black"><h1 className="text-2xl text-indigo-600 tracking-tighter leading-none mb-1">SILK POS</h1><p className="text-[10px] text-slate-400 uppercase tracking-widest">Enterprise V2.5 Pro</p></div>
                        <div className="flex flex-row md:flex-col w-full justify-around md:justify-start md:space-y-4 px-2">
                            {[{id:'sales',icon:'shopping-cart',label:'銷售'},{id:'inventory',icon:'package',label:'庫存'},{id:'history',icon:'history',label:'報表'},{id:'settings',icon:'settings',label:'設定'}].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col lg:flex-row items-center lg:space-x-4 p-3 lg:px-6 lg:w-[90%] mx-auto rounded-[1.5rem] transition-all duration-300 ${view === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-105 font-black' : 'text-slate-400 hover:bg-slate-50'}`} >
                                    <i data-lucide={item.icon} className="w-6 h-6 transition-transform group-active:scale-90"></i><span className="text-[10px] lg:text-base font-black mt-1 lg:mt-0 tracking-tighter uppercase">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                    <main className="flex-1 pb-20 md:pb-0 overflow-hidden h-full">
                        {view === 'sales' && <SalesView products={products} inventory={inventory} cart={cart} setCart={setCart} staffs={staffs} discounts={discounts} payments={payments} tags={tags} />}
                        {view === 'inventory' && <InventoryView products={products} inventory={inventory} tags={tags} staffs={staffs} payments={payments} />}
                        {view === 'history' && <HistoryView />}
                        {view === 'settings' && <SettingsView staffs={staffs} discounts={discounts} payments={payments} tags={tags} products={products} setConfirmState={setConfirmState} />}
                    </main>
                    {confirmState && (<ConfirmModal title={confirmState.title} message={confirmState.message} onConfirm={() => { confirmState.action(); setConfirmState(null); }} onCancel={() => setConfirmState(null)} />)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">顯示名稱</label><input type="text" className="w-full p-4 rounded-xl border bg-slate-50 outline-none shadow-inner font-sans font-black font-bold" value={editModal.item.name} onChange={e => setEditModal({...editModal, item: {...editModal.item, name: e.target.value}})} /></div>
                                {editModal.coll === 'settings_discounts' && (
                                    <div className="grid grid-cols-2 gap-4 font-sans font-bold">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">類型</label><select className="w-full p-4 rounded-xl border bg-slate-50 outline-none font-sans font-black font-bold" value={editModal.item.type} onChange={e => setEditModal({...editModal, item: {...editModal.item, type: e.target.value}})}><option value="amount">金額</option><option value="percent">%</option></select></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">數值</label><input type="number" inputmode="numeric" className="w-full p-4 rounded-xl border bg-slate-50 outline-none font-sans font-black font-bold" value={editModal.item.value} onChange={e => setEditModal({...editModal, item: {...editModal.item, value: parseInt(e.target.value) || 0}})} /></div>
                                    </div>
                                )}
                                <button onClick={async () => { await getColl(editModal.coll).doc(editModal.item.id).update(editModal.item); setEditModal({ open: false, coll: '', item: null }); }} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 font-sans tracking-widest uppercase font-bold font-sans font-bold">儲存</button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const App = () => {
            const [view, setView] = useState('sales');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [products, setProducts] = useState([]);
            const [inventory, setInventory] = useState({});
            const [staffs, setStaffs] = useState([]);
            const [discounts, setDiscounts] = useState([]);
            const [payments, setPayments] = useState([]);
            const [tags, setTags] = useState([]);
            const [bundles, setBundles] = useState([]);
            const [cart, setCart] = useState([]);
            const [confirmState, setConfirmState] = useState(null);

            useEffect(() => {
                const initAuth = async () => { try { await auth.signInAnonymously(); } finally { setLoading(false); } };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => setUser(u));
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const unsubs = [
                    getColl('products').onSnapshot(s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('inventory').onSnapshot(s => { const i = {}; s.docs.forEach(d => i[d.id] = d.data().count||0); setInventory(i); }),
                    getColl('settings_staff').onSnapshot(s => setStaffs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_payments').onSnapshot(s => setPayments(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_tags').onSnapshot(s => setTags(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_discounts').onSnapshot(s => setDiscounts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_bundles').onSnapshot(s => setBundles(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            if (loading) return (<div className="fixed inset-0 flex items-center justify-center bg-white z-50 text-center animate-pulse"><div className="space-y-6"><div className="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto font-sans font-bold"></div><p className="text-slate-400 font-black tracking-widest uppercase text-[10px]">加密安全同步中...</p></div></div>);

            return (
                <div className="min-h-screen h-screen flex flex-col md:flex-row bg-slate-50 text-slate-800 overflow-hidden font-sans font-bold">
                    <nav className="fixed bottom-0 left-0 right-0 md:relative md:w-20 lg:w-64 bg-white border-t md:border-t-0 md:border-r z-40 flex md:flex-col items-center py-2 md:py-8 shadow-2xl md:shadow-none">
                        <div className="hidden lg:block mb-10 px-6 w-full text-center font-black"><h1 className="text-2xl text-indigo-600 tracking-tighter leading-none mb-1">SILK POS</h1><p className="text-[10px] text-slate-400 uppercase tracking-widest font-black">Enterprise V2.5 Pro</p></div>
                        <div className="flex flex-row md:flex-col w-full justify-around md:justify-start md:space-y-4 px-2 font-bold">
                            {[{id:'sales',icon:<Icons.Cart/>,label:'銷售'},{id:'inventory',icon:<Icons.Package/>,label:'庫存'},{id:'history',icon:<Icons.History/>,label:'報表'},{id:'settings',icon:<Icons.Settings/>,label:'設定'}].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col lg:flex-row items-center lg:space-x-4 p-3 lg:px-6 lg:w-[90%] mx-auto rounded-[1.5rem] transition-all duration-300 ${view === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-105 font-black' : 'text-slate-400 hover:bg-slate-50'} font-sans font-bold`} >
                                    <span className="w-6 h-6">{item.icon}</span><span className="text-[10px] lg:text-base font-black mt-1 lg:mt-0 tracking-tighter uppercase font-sans font-bold">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                    <main className="flex-1 pb-20 md:pb-0 overflow-hidden h-full">
                        {view === 'sales' && <SalesView products={products} inventory={inventory} cart={cart} setCart={setCart} staffs={staffs} discounts={discounts} payments={payments} tags={tags} bundles={bundles} />}
                        {view === 'inventory' && <InventoryView products={products} inventory={inventory} tags={tags} staffs={staffs} payments={payments} />}
                        {view === 'history' && <HistoryView staffs={staffs} payments={payments} discounts={discounts} />}
                        {view === 'settings' && <SettingsView staffs={staffs} discounts={discounts} payments={payments} tags={tags} products={products} setConfirmState={setConfirmState} bundles={bundles} />}
                    </main>
                    {confirmState && (<ConfirmModal title={confirmState.title} message={confirmState.message} onConfirm={() => { confirmState.action(); setConfirmState(null); }} onCancel={() => setConfirmState(null)} />)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

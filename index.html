<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流光行動 POS 系統 - 專業進階版</title>
    
    <!-- iOS 網頁 App 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SILK POS">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9425/9425114.png">

    <!-- 外部資源庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overscroll-behavior: none; color: #1e293b; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .drag-handle { cursor: grab; }
        .drag-handle:active { cursor: grabbing; }
        .sortable-ghost { opacity: 0.4; background-color: #e0e7ff !important; }
        @media (display-mode: standalone) { nav { padding-top: 30px; } }
        input::-webkit-outer-spin-button, input::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type=number] { -moz-appearance: textfield; }
        button:active { transform: scale(0.96); transition: transform 0.1s; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ========================================================
        // ⚠️ Firebase 配置 (維持數據連結)
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDKj0O-cN9e4qQ0f7LTxNRutOjB-LUX5qk",
            authDomain: "my-pos-be7b2.firebaseapp.com",
            projectId: "my-pos-be7b2",
            storageBucket: "my-pos-be7b2.firebasestorage.app",
            messagingSenderId: "499859190156",
            appId: "1:499859190156:web:bcd8dbce13055b6c1e26a9",
            measurementId: "G-G76PVXEXPB"
        };
        
        const appId = 'pos-pro-v2-main';

        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = firebase.firestore();
        const auth = firebase.auth();

        const getColl = (name) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);

        // --- UI 元件 ---
        const IconEdit = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
        const IconTrash = () => (<svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const IconGrip = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>);

        const Modal = ({ title, children, onClose, wide = false }) => {
            useEffect(() => { const timer = setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 100); return () => clearTimeout(timer); }, []);
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm text-slate-800">
                    <div className={`bg-white rounded-3xl shadow-2xl w-full ${wide ? 'max-w-4xl' : 'max-w-lg'} overflow-hidden flex flex-col max-h-[90vh]`}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50 font-bold">
                            <h3 className="text-xl font-black">{title}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-400 transition-colors"><i data-lucide="x" className="w-6 h-6"></i></button>
                        </div>
                        <div className="p-6 overflow-y-auto flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        const ConfirmModal = ({ title, message, onConfirm, onCancel }) => (
            <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/50 backdrop-blur-md text-slate-800">
                <div className="bg-white rounded-[2rem] shadow-2xl w-full max-w-sm overflow-hidden p-8 text-center space-y-6">
                    <div className="w-20 h-20 bg-rose-50 rounded-full flex items-center justify-center mx-auto text-rose-500"><i data-lucide="alert-triangle" className="text-rose-500 w-10 h-10"></i></div>
                    <div className="space-y-2"><h3 className="text-2xl font-bold text-slate-800">{title || "確認刪除"}</h3><p className="text-slate-500">{message}</p></div>
                    <div className="flex gap-4">
                        <button onClick={onCancel} className="flex-1 py-4 bg-slate-100 rounded-2xl font-bold text-slate-600 hover:bg-slate-200 transition-all font-sans">取消</button>
                        <button onClick={onConfirm} className="flex-1 py-4 bg-rose-500 rounded-2xl font-bold text-white hover:bg-rose-600 shadow-lg shadow-rose-200 transition-all font-sans">確認</button>
                    </div>
                </div>
            </div>
        );

        const DraggableList = ({ items, onSorted, renderItem, component: Component = 'div', className = "" }) => {
            const listRef = useRef(null);
            useEffect(() => {
                if (!listRef.current || items.length === 0) return;
                const sortable = Sortable.create(listRef.current, {
                    animation: 150, ghostClass: 'sortable-ghost', handle: '.drag-handle',
                    onEnd: (evt) => {
                        const { oldIndex, newIndex } = evt;
                        if (oldIndex === newIndex) return;
                        const newItems = [...items];
                        const [moved] = newItems.splice(oldIndex, 1);
                        newItems.splice(newIndex, 0, moved);
                        onSorted(newItems);
                    }
                });
                return () => sortable.destroy();
            }, [items, onSorted]);
            return <Component ref={listRef} className={className}>{items.map((item, idx) => renderItem(item, idx))}</Component>;
        };

        // --- 結帳對話框 (支援折扣複選：先加減後乘除) ---
        const CheckoutModal = ({ cart, subtotal, staffs, discounts = [], payments, onClose, onSuccess, type = "SALE" }) => {
            const [selectedStaff, setSelectedStaff] = useState('');
            const [selectedDiscounts, setSelectedDiscounts] = useState([]); 
            const [selectedPayment, setSelectedPayment] = useState('');
            const [selectedDate, setSelectedDate] = useState(new Date().toISOString().split('T')[0]); 
            const [notes, setNotes] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const isSale = type === "SALE";

            const toggleDiscount = (d) => {
                if (selectedDiscounts.find(item => item.id === d.id)) {
                    setSelectedDiscounts(selectedDiscounts.filter(item => item.id !== d.id));
                } else {
                    setSelectedDiscounts([...selectedDiscounts, d]);
                }
            };

            const finalPrice = useMemo(() => {
                if (!isSale || selectedDiscounts.length === 0) return subtotal;
                let price = subtotal;
                const amountOff = selectedDiscounts.filter(d => d.type === 'amount').reduce((acc, d) => acc + (d.value || 0), 0);
                price -= amountOff;
                const percentOff = selectedDiscounts.filter(d => d.type === 'percent').reduce((acc, d) => acc + ((d.value || 0) / 100), 0);
                price = Math.round(price * (1 - percentOff));
                return Math.max(0, price);
            }, [subtotal, selectedDiscounts, isSale]);

            const handleCheckout = async () => {
                if (!selectedStaff || (isSale && !selectedPayment)) return;
                setIsSubmitting(true);
                try {
                    const batch = db.batch();
                    const orderNo = `${isSale ? 'ORD' : 'PUR'}-${Date.now()}`;
                    const transRef = getColl('transactions').doc();
                    const dateObj = new Date(selectedDate);
                    dateObj.setHours(12, 0, 0, 0); 
                    const timestamp = firebase.firestore.Timestamp.fromDate(dateObj);

                    batch.set(transRef, {
                        orderNo, type, items: cart, subtotal, 
                        discountName: isSale ? (selectedDiscounts.map(d => d.name).join(', ') || '無') : '-',
                        discountValue: isSale ? selectedDiscounts.reduce((acc, d) => acc + (d.value || 0), 0) : 0,
                        // 儲存所選折扣的完整標記以便報表編輯回溯
                        discountIds: isSale ? selectedDiscounts.map(d => d.id) : [],
                        finalPrice: isSale ? finalPrice : 0, staff: selectedStaff,
                        payment: isSale ? selectedPayment : '無', 
                        notes, timestamp: timestamp,
                        searchText: `${orderNo} ${selectedStaff} ${isSale ? selectedPayment : ''} ${notes} ${cart.map(i => i.name).join(' ')} ${isSale ? '銷售' : '進貨'}`.toLowerCase()
                    });
                    for (const item of cart) {
                        const increment = isSale ? -item.qty : item.qty;
                        batch.update(getColl('inventory').doc(item.id), { count: firebase.firestore.FieldValue.increment(increment) });
                    }
                    await batch.commit();
                    onSuccess();
                } catch (err) { console.error("結帳失敗:", err); } finally { setIsSubmitting(false); }
            };

            return (
                <Modal title={isSale ? "銷售結帳" : "入庫確認"} onClose={onClose}>
                    <div className="space-y-6 text-slate-800 font-sans">
                        <div>
                            <label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">交易日期</label>
                            <input type="date" className="w-full p-4 rounded-xl border bg-white font-bold text-slate-700 outline-none focus:ring-2 focus:ring-indigo-500" value={selectedDate} onChange={e => setSelectedDate(e.target.value)} />
                        </div>
                        <div className={`grid ${isSale ? 'grid-cols-2' : 'grid-cols-1'} gap-4`}>
                            <div><label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">經手人員</label><select className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" value={selectedStaff} onChange={e => setSelectedStaff(e.target.value)}><option value="">請選擇</option>{staffs.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select></div>
                            {isSale && (<div><label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">付款方式</label><select className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" value={selectedPayment} onChange={e => setSelectedPayment(e.target.value)}><option value="">請選擇</option>{payments.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}</select></div>)}
                        </div>
                        {isSale && (
                            <div><label className="block text-[10px] font-black text-slate-400 mb-2 uppercase tracking-widest">折扣方案 (多選：先減額後乘%)</label>
                                <div className="flex flex-wrap gap-2">
                                    {discounts.map(d => {
                                        const isActive = selectedDiscounts.find(item => item.id === d.id);
                                        return (
                                            <button key={d.id} onClick={() => toggleDiscount(d)} className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all ${isActive ? 'bg-indigo-600 text-white shadow-lg' : 'bg-white text-slate-400 border-slate-200'}`}>
                                                {d.name} {d.type === 'percent' ? `(${d.value}%)` : `(-$${d.value})`}
                                            </button>
                                        );
                                    })}
                                </div>
                            </div>
                        )}
                        <div><label className="block text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">備註</label><input type="text" className="w-full p-4 rounded-xl bg-slate-50 border outline-none font-bold" placeholder="..." value={notes} onChange={e => setNotes(e.target.value)} /></div>
                        {isSale && (<div className="p-6 rounded-[2rem] text-center bg-indigo-50 border-2 border-indigo-100 shadow-sm"><p className="text-[10px] font-black text-slate-400 mb-1 uppercase tracking-widest">應收總額計</p><span className="text-5xl font-black text-indigo-700 tracking-tighter">${finalPrice}</span></div>)}
                        <button disabled={!selectedStaff || (isSale && !selectedPayment) || isSubmitting} onClick={handleCheckout} className={`w-full py-5 rounded-2xl font-black shadow-xl text-white transition-all transform active:scale-95 ${isSale ? 'bg-indigo-600 hover:bg-indigo-700' : 'bg-emerald-600 hover:bg-emerald-700'}`}>{isSubmitting ? '正在存檔...' : '確認提交'}</button>
                    </div>
                </Modal>
            );
        };

        // --- 銷售模組 (優化滾動) ---
        const SalesView = ({ products, inventory, cart, setCart, staffs, discounts, payments, tags }) => {
            const [search, setSearch] = useState('');
            const [barcodeInput, setBarcodeInput] = useState('');
            const [selectedTag, setSelectedTag] = useState('全部');
            const [showCheckout, setShowCheckout] = useState(false);
            const [priceModal, setPriceModal] = useState(null);
            const barcodeInputRef = useRef(null);

            const filtered = useMemo(() => products.filter(p => (p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode || '').includes(search)) && (selectedTag === '全部' || p.tags?.includes(selectedTag))), [products, search, selectedTag]);
            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            const addToCart = (product, option) => {
                if ((inventory[product.id] || 0) < 1) return;
                const cartId = `${product.id}-${option.label}`;
                setCart(prev => {
                    const existing = prev.find(item => item.cartId === cartId);
                    if (existing) return prev.map(item => item.cartId === cartId ? {...item, qty: item.qty + 1} : item);
                    return [...prev, { ...product, ...option, qty: 1, cartId }];
                });
                setPriceModal(null); setBarcodeInput(''); setTimeout(() => barcodeInputRef.current?.focus(), 50);
            };

            return (
                <div className="h-full flex flex-col lg:flex-row overflow-hidden font-sans">
                    <div className="flex-1 flex flex-col p-4 lg:p-8 space-y-4 overflow-hidden font-sans font-bold">
                        <header className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="relative"><i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input type="text" inputmode="search" placeholder="搜尋商品..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-sm outline-none font-bold" value={search} onChange={e => setSearch(e.target.value)} /></div>
                            <div className="relative"><i data-lucide="barcode" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-indigo-500"></i><input ref={barcodeInputRef} type="text" inputmode="text" placeholder="條碼區域..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-indigo-100 bg-indigo-50/30 focus:border-indigo-500 outline-none font-black shadow-inner" value={barcodeInput} onChange={e => setBarcodeInput(e.target.value)} onKeyDown={e => {
                                if (e.key === 'Enter') {
                                    const p = products.find(x => x.barcode === barcodeInput.trim());
                                    if (p && (inventory[p.id] || 0) >= 1) p.options?.length === 1 ? addToCart(p, p.options[0]) : setPriceModal(p);
                                    setBarcodeInput('');
                                }
                            }} autoFocus /></div>
                        </header>
                        
                        <div className="flex overflow-x-auto space-x-2 pb-2 scrollbar-hide min-h-[40px] items-center border-b border-slate-100">
                            <button onClick={() => setSelectedTag('全部')} className={`px-3 py-1.5 rounded-full transition-all shrink-0 text-[11px] font-black tracking-tighter ${selectedTag === '全部' ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-200'}`}>全部</button>
                            {tags.map(t => (<button key={t.id} onClick={() => setSelectedTag(t.name)} className={`px-3 py-1.5 rounded-full transition-all shrink-0 text-[11px] font-black tracking-tighter ${selectedTag === t.name ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border border-slate-200'}`}>{t.name}</button>))}
                        </div>

                        <div className="flex-1 overflow-y-auto pb-20 scrollbar-hide">
                            <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4">
                                {filtered.map(p => {
                                    const stock = inventory[p.id] || 0;
                                    const isOutOfStock = stock < 1;
                                    return (
                                        <div key={p.id} onClick={() => !isOutOfStock && (p.options?.length === 1 ? addToCart(p, p.options[0]) : setPriceModal(p))} className={`bg-white p-4 rounded-[2rem] border shadow-sm transition-all cursor-pointer group flex flex-col ${isOutOfStock ? 'opacity-40 grayscale-[0.3]' : 'hover:shadow-md hover:border-indigo-100'}`}>
                                            <div className="w-full aspect-square rounded-3xl overflow-hidden bg-slate-100 mb-3 shadow-inner">{p.imageUrl ? <img src={p.imageUrl} alt={p.name} className="w-full h-full object-cover group-hover:scale-110 transition-transform" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><i data-lucide="image" className="w-10 h-10"></i></div>}</div>
                                            <div className="flex-1 flex flex-col justify-between">
                                                <div><div className="flex justify-between items-start mb-1 font-black text-[9px] text-slate-400 uppercase tracking-tighter"><span>{p.barcode || '無碼'}</span><span className={`${isOutOfStock ? 'text-rose-500' : 'text-indigo-500'}`}>庫存: {stock}</span></div><h4 className="font-black text-sm line-clamp-1">{p.name}</h4></div>
                                                <div className="flex justify-between items-end mt-2"><div className="font-black text-xl text-indigo-600">${(p.options?.[0]?.price || 0)}</div>{!isOutOfStock && <div className="bg-slate-100 p-2 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-all shadow-sm"><i data-lucide="plus" className="w-4 h-4"></i></div>}</div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                    <div className="w-full lg:w-96 bg-white border-l flex flex-col shadow-2xl z-30 font-sans font-bold">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50/50 font-black tracking-widest uppercase"><h2 className="text-xl flex items-center text-slate-700 tracking-tighter font-sans font-bold"><i data-lucide="shopping-bag" className="w-5 h-5 mr-2 text-indigo-600"></i>銷售籃</h2><button onClick={() => setCart([])} className="text-xs font-bold text-rose-500 hover:underline">清空</button></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide font-sans font-bold">
                            {cart.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 p-8 text-center opacity-40 font-black font-sans font-bold"><i data-lucide="shopping-cart" className="w-16 h-16"></i><p>尚未選擇商品</p></div> : 
                            cart.map((item) => (
                                <div key={item.cartId} className="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl border border-slate-100 animate-in slide-in-from-right duration-300 font-sans font-bold">
                                    <div className="flex-1 font-sans font-bold"><p className="font-black text-slate-700 leading-tight">{item.name}</p><p className="text-[10px] text-slate-400 uppercase">{item.label}</p><p className="text-indigo-600 font-black mt-1">${item.price}</p></div>
                                    <div className="flex items-center bg-white rounded-xl border p-1 shadow-sm font-sans font-bold">
                                        <button onClick={() => { if(item.qty > 1) setCart(prev => prev.map(c => c.cartId === item.cartId ? {...c, qty: c.qty - 1} : c)); else setCart(prev => prev.filter(c => c.cartId !== item.cartId)); }} className="p-1 text-rose-400 active:scale-75 transition-transform"><i data-lucide="minus-circle" className="w-5 h-5"></i></button>
                                        <span className="w-8 text-center font-black">{item.qty}</span>
                                        <button onClick={() => { if(inventory[item.id] > item.qty) setCart(prev => prev.map(c => c.cartId === item.cartId ? {...c, qty: c.qty + 1} : c)); }} className="p-1 text-emerald-500 active:scale-75 transition-transform"><i data-lucide="plus-circle" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-6 border-t bg-slate-50 space-y-4 shadow-inner font-sans font-bold">
                            <div className="flex justify-between items-center font-sans font-bold"><span className="text-slate-500 font-black text-sm uppercase tracking-widest font-sans">合計金額</span><span className="font-black text-4xl text-slate-800 tracking-tighter">${subtotal}</span></div>
                            <button disabled={cart.length === 0} onClick={() => setShowCheckout(true)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-black text-xl shadow-xl hover:bg-indigo-700 disabled:opacity-50 transition-all flex items-center justify-center space-x-3 transform active:scale-95"><span>確認結帳</span><i data-lucide="chevron-right" className="w-6 h-6"></i></button>
                        </div>
                    </div>
                    {priceModal && (<Modal title={`規格選擇 - ${priceModal.name}`} onClose={() => setPriceModal(null)}><div className="grid grid-cols-1 gap-3 font-bold">{priceModal.options?.map((opt, i) => (<button key={i} onClick={() => addToCart(priceModal, opt)} className="flex justify-between items-center p-5 bg-slate-50 hover:bg-indigo-50 border rounded-2xl transition-all shadow-sm active:scale-[0.98] font-sans font-bold"><span className="text-slate-700 font-sans font-bold font-black">{opt.label}</span><span className="text-indigo-600 font-black text-xl">${opt.price}</span></button>)) }</div></Modal>)}
                    {showCheckout && <CheckoutModal cart={cart} subtotal={subtotal} staffs={staffs} discounts={discounts} payments={payments} onClose={() => setShowCheckout(false)} onSuccess={() => { setShowCheckout(false); setCart([]); }} type="SALE" />}
                </div>
            );
        };

        // --- 庫存與進貨 ---
        const InventoryView = ({ products, inventory, tags, staffs, payments }) => {
            const [selectedTag, setSelectedTag] = useState('全部');
            const [adjusting, setAdjusting] = useState(null);
            const [inboundCart, setInboundCart] = useState([]);
            const [showInboundCheckout, setShowInboundCheckout] = useState(false);
            const filteredProducts = products.filter(p => selectedTag === '全部' || p.tags?.includes(selectedTag));

            useEffect(() => { if (window.lucide) window.lucide.createIcons(); }, [inboundCart, adjusting, showInboundCheckout]);

            const handleQuickAdjust = async (product, type, value) => {
                const num = parseInt(value);
                if (isNaN(num)) return;
                try {
                    const invRef = getColl('inventory').doc(product.id);
                    if (type === 'SET') await invRef.set({ count: num }, { merge: true });
                    else if (type === 'IN') await invRef.set({ count: firebase.firestore.FieldValue.increment(num) }, { merge: true });
                    setAdjusting(null);
                } catch (e) { console.error("調整失敗:", e); }
            };

            const addToInbound = (product, option) => {
                const cartId = `${product.id}-${option.label}`;
                const existing = inboundCart.find(item => item.cartId === cartId);
                if (existing) setInboundCart(prev => prev.map(item => item.cartId === cartId ? {...item, qty: item.qty + 1} : item));
                else setInboundCart(prev => [...prev, { ...product, ...option, qty: 1, cartId }]);
            };

            return (
                <div className="h-full flex flex-col lg:flex-row overflow-hidden font-sans font-bold">
                    <div className="flex-1 p-4 lg:p-8 space-y-6 overflow-y-auto scrollbar-hide">
                        <header className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4"><h2 className="text-2xl font-black text-slate-800 tracking-tight font-sans font-bold">庫存與批次管理</h2><select className="p-2 rounded-xl border bg-white outline-none font-black" value={selectedTag} onChange={e => setSelectedTag(e.target.value)}><option value="全部">全部顯示</option>{tags.map(t => <option key={t.id} value={t.name}>{t.name}</option>)}</select></header>
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4 pb-20 font-sans font-bold">
                            {filteredProducts.map(p => (
                                <div key={p.id} className="bg-white p-5 rounded-[2rem] border shadow-sm hover:border-indigo-100 transition-all group">
                                    <div className="flex justify-between items-start mb-4">
                                        <div className="flex gap-4"><div className="w-14 h-14 rounded-2xl bg-slate-100 overflow-hidden shrink-0 shadow-inner">{p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <i data-lucide="image" className="w-6 h-6 m-4 text-slate-300 font-sans font-bold"></i>}</div><div><h4 className="font-black text-slate-700 line-clamp-1">{p.name}</h4><p className="text-[10px] font-black text-slate-400 uppercase tracking-tighter">{p.barcode || '-'}</p></div></div>
                                        <span className={`px-4 py-2 rounded-full text-sm font-black shadow-sm ${inventory[p.id] <= 5 ? 'bg-rose-50 text-rose-500 border border-rose-100' : 'bg-emerald-50 text-emerald-500 border border-emerald-100'}`}>{inventory[p.id] || 0}</span>
                                    </div>
                                    <div className="grid grid-cols-2 gap-2 mb-3">
                                        <button onClick={() => setAdjusting({product: p, type: 'IN'})} className="bg-slate-50 text-slate-600 py-3 rounded-2xl text-xs font-black hover:bg-white transition-all border font-sans font-bold">快速進貨</button>
                                        <button onClick={() => setAdjusting({product: p, type: 'SET'})} className="bg-slate-50 text-slate-600 py-3 rounded-2xl text-xs font-black hover:bg-white transition-all border font-sans font-bold">盤點修正</button>
                                    </div>
                                    <button onClick={() => (p.options?.length === 1) ? addToInbound(p, p.options[0]) : setAdjusting({product: p, type: 'SELECT_INBOUND'})} className="w-full bg-emerald-50 text-emerald-600 py-3 rounded-2xl text-xs font-black hover:bg-emerald-100 flex items-center justify-center gap-2 transition-all border border-emerald-100 uppercase tracking-widest font-sans font-bold"><i data-lucide="plus-circle" className="w-4 h-4 font-sans font-bold"></i>加入進貨單</button>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full lg:w-96 bg-white border-l flex flex-col shadow-2xl font-sans font-bold">
                        <div className="p-6 border-b flex justify-between items-center bg-emerald-50/20 text-emerald-700 font-black tracking-tighter uppercase font-sans font-bold"><h2 className="text-xl flex items-center font-sans font-bold"><i data-lucide="truck" className="w-5 h-5 mr-2 font-sans font-bold"></i>進貨單</h2><button onClick={() => setInboundCart([])} className="text-[10px] font-black text-rose-500 hover:underline tracking-tighter">清空</button></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4 scrollbar-hide font-sans font-bold">
                            {inboundCart.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 text-center p-8 opacity-40 font-black"><i data-lucide="clipboard-list" className="w-16 h-16"></i><p>目前無項目</p></div> : 
                            inboundCart.map((item) => (
                                <div key={item.cartId} className="flex items-center space-x-4 bg-emerald-50/10 p-4 rounded-3xl border border-emerald-50 shadow-sm animate-in slide-in-from-bottom duration-300 font-sans font-bold">
                                    <div className="flex-1 font-sans font-bold"><p className="font-black text-slate-700 leading-none mb-1 font-sans">{item.name}</p><p className="text-[10px] text-slate-400 font-black uppercase font-sans font-bold">{item.label}</p></div>
                                    <div className="flex items-center bg-white rounded-xl border p-1 shadow-sm font-sans font-bold">
                                        <button onClick={() => { if(item.qty > 1) setInboundCart(prev => prev.map(c => c.cartId === item.cartId ? {...c, qty: c.qty - 1} : c)); else setInboundCart(prev => prev.filter(c => c.cartId !== item.cartId)); }} className="p-1 text-rose-400 active:scale-75 transition-transform"><i data-lucide="minus-circle" className="w-5 h-5"></i></button>
                                        <input type="number" inputmode="numeric" className="w-12 text-center font-black text-sm bg-transparent outline-none border-none text-slate-700" value={item.qty} onChange={(e) => {
                                            const val = parseInt(e.target.value);
                                            setInboundCart(prev => prev.map(c => c.cartId === item.cartId ? {...c, qty: isNaN(val) ? 1 : Math.max(1, val)} : c));
                                        }} onFocus={(e) => e.target.select()} />
                                        <button onClick={() => setInboundCart(prev => prev.map(c => c.cartId === item.cartId ? {...c, qty: c.qty + 1} : c))} className="p-1 text-emerald-500 active:scale-75 transition-transform font-sans font-bold font-sans font-bold"><i data-lucide="plus-circle" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            )) }
                        </div>
                        <div className="p-6 border-t bg-slate-50 shadow-inner font-sans font-bold"><button disabled={inboundCart.length === 0} onClick={() => setShowInboundCheckout(true)} className="w-full bg-emerald-600 text-white py-5 rounded-[2rem] font-black text-xl shadow-xl hover:bg-emerald-700 transition-all flex items-center justify-center space-x-3 transform active:scale-95 font-sans font-bold uppercase"><span>確認入庫</span><i data-lucide="check-circle" className="w-6 h-6"></i></button></div>
                    </div>
                    {adjusting && adjusting.type !== 'SELECT_INBOUND' && (
                        <Modal title={`${adjusting.type === 'IN' ? '快速進貨' : '盤點校正'} - ${adjusting.product.name}`} onClose={() => setAdjusting(null)}>
                            <div className="space-y-6 text-center font-sans font-bold">
                                <div className="p-4 bg-slate-50 rounded-2xl border text-xs font-black text-slate-400 uppercase tracking-widest">當前庫存量: {inventory[adjusting.product.id] || 0}</div>
                                <input type="number" inputmode="numeric" autoFocus placeholder="..." className="w-full p-6 rounded-3xl bg-slate-100 text-center text-6xl font-black outline-none border-4 border-indigo-200 shadow-inner focus:border-indigo-500 transition-colors font-sans font-bold" onKeyDown={e => e.key === 'Enter' && handleQuickAdjust(adjusting.product, adjusting.type, e.target.value)} />
                                <button onClick={e => handleQuickAdjust(adjusting.product, adjusting.type, e.currentTarget.previousSibling.value)} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 font-sans font-bold">完成調整</button>
                            </div>
                        </Modal>
                    )}
                    {adjusting?.type === 'SELECT_INBOUND' && (
                        <Modal title={`進貨規格 - ${adjusting.product.name}`} onClose={() => setAdjusting(null)}>
                            <div className="grid grid-cols-1 gap-3 font-bold font-sans font-bold">{adjusting.product.options?.map((opt, i) => (<button key={i} onClick={() => { addToInbound(adjusting.product, opt); }} className="p-5 bg-slate-50 rounded-2xl text-left hover:bg-emerald-50 transition-colors flex justify-between shadow-sm border active:scale-[0.98] font-sans font-bold"><span className="text-slate-700 font-sans font-bold font-black">{opt.label}</span><span className="text-emerald-600 font-black text-xl">${opt.price}</span></button>)) }</div>
                        </Modal>
                    )}
                    {showInboundCheckout && (<CheckoutModal cart={inboundCart} subtotal={0} staffs={staffs} payments={payments} onClose={() => setShowInboundCheckout(false)} onSuccess={() => { setShowInboundCheckout(false); setInboundCart([]); }} type="PURCHASE" />)}
                </div>
            );
        };

        // --- 報表視圖 (進階編輯與刪除) ---
        const HistoryView = ({ staffs, payments, discounts }) => {
            const [orders, setOrders] = useState([]);
            const [search, setSearch] = useState('');
            const [startDate, setStartDate] = useState(new Date().toISOString().split('T')[0]);
            const [endDate, setEndDate] = useState(new Date().toISOString().split('T')[0]);
            const [editOrder, setEditOrder] = useState(null);
            const [confirmDelete, setConfirmDelete] = useState(null);

            const fetchData = async () => {
                const snap = await getColl('transactions').get();
                setOrders(snap.docs.map(doc => ({id: doc.id, ...doc.data()})));
            };

            useEffect(() => { fetchData(); }, []);

            const filtered = useMemo(() => orders.filter(o => {
                const d = o.timestamp?.toDate ? o.timestamp.toDate().toISOString().split('T')[0] : '';
                return (d >= startDate && d <= endDate) && (!search || o.searchText?.includes(search.toLowerCase()));
            }).sort((a, b) => (b.timestamp?.seconds || 0) - (a.timestamp?.seconds || 0)), [orders, search, startDate, endDate]);

            // 計算編輯中的最終總額
            const calcEditFinal = (o) => {
                if (o.type !== 'SALE') return 0;
                let sub = o.items.reduce((acc, it) => acc + (it.price * it.qty), 0);
                let selected = discounts.filter(d => (o.discountIds || []).includes(d.id));
                let price = sub;
                price -= selected.filter(d => d.type === 'amount').reduce((acc, d) => acc + (d.value || 0), 0);
                price = Math.round(price * (1 - selected.filter(d => d.type === 'percent').reduce((acc, d) => acc + ((d.value || 0) / 100), 0)));
                return Math.max(0, price);
            };

            const handleSaveEdit = async () => {
                if (!editOrder) return;
                const { id, ...data } = editOrder;
                if (data.type === 'SALE') {
                    data.subtotal = editOrder.items.reduce((acc, it) => acc + (it.price * it.qty), 0);
                    data.finalPrice = calcEditFinal(editOrder);
                    const selected = discounts.filter(d => (editOrder.discountIds || []).includes(d.id));
                    data.discountName = selected.map(d => d.name).join(', ') || '無';
                }
                await getColl('transactions').doc(id).update(data);
                setEditOrder(null);
                fetchData();
            };

            const exportToXlsx = () => {
                const data = [];
                filtered.forEach(o => {
                    o.items.forEach(item => {
                        data.push({ '編號': o.orderNo, '類型': o.type, '日期': o.timestamp?.toDate().toISOString().split('T')[0], '品項': `${item.name} (${item.label})`, '數量': item.qty, '總額': o.type === 'SALE' ? o.finalPrice : '-', '經手': o.staff });
                    });
                });
                const ws = XLSX.utils.json_to_sheet(data); const wb = XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb, ws, "報表"); XLSX.writeFile(wb, `POS營運紀錄_${startDate}.xlsx`);
            };

            return (
                <div className="p-4 lg:p-8 space-y-6 pb-20 scrollbar-hide overflow-y-auto h-full font-sans font-bold">
                    <header className="flex flex-col md:flex-row md:items-center justify-between gap-4 font-sans font-bold"><h2 className="text-2xl font-black text-slate-800 tracking-tight uppercase">歷史交易與數據中心</h2><div className="flex gap-2 font-sans font-bold"><div className="flex bg-white border rounded-xl shadow-sm overflow-hidden font-sans font-bold"><input type="date" className="p-2 text-xs font-bold outline-none font-sans" value={startDate} onChange={e => setStartDate(e.target.value)} /><input type="date" className="p-2 text-xs font-bold border-l outline-none font-sans" value={endDate} onChange={e => setEndDate(e.target.value)} /></div><button onClick={exportToXlsx} className="bg-emerald-600 text-white px-5 py-3 rounded-xl font-black text-xs shadow-lg uppercase tracking-widest hover:bg-emerald-700 active:scale-95 font-sans font-bold"><i data-lucide="file-spreadsheet" className="w-4 h-4 mr-1"></i>匯出</button></div></header>
                    <input className="w-full p-4 rounded-2xl border-none ring-1 ring-slate-200 font-bold outline-none bg-white shadow-sm font-sans font-bold" placeholder="搜尋內容..." value={search} onChange={e => setSearch(e.target.value)} />
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filtered.map(o => (
                            <div key={o.id} className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4 relative overflow-hidden group hover:border-indigo-100 transition-all font-sans font-bold animate-in fade-in duration-500">
                                <div className={`absolute top-0 right-0 px-4 py-1 text-[9px] font-black uppercase text-white shadow-md ${o.type === 'PURCHASE' ? 'bg-emerald-500' : 'bg-indigo-500'} font-sans font-black`}>{o.type}</div>
                                <div className="flex justify-between items-start border-b border-slate-50 pb-3 font-sans font-bold">
                                    <div className="font-bold"><p className="text-[9px] font-black text-slate-400 mb-1 uppercase tracking-widest">{o.orderNo}</p><h4 className="font-black text-slate-700 leading-none text-lg">{o.timestamp?.toDate().toISOString().split('T')[0]}</h4></div>
                                    <div className="flex gap-2 opacity-0 group-hover:opacity-100 transition-all">
                                        <button onClick={() => setEditOrder(JSON.parse(JSON.stringify(o)))} className="p-2 bg-slate-50 text-indigo-500 rounded-xl hover:bg-indigo-500 hover:text-white transition-colors"><IconEdit /></button>
                                        <button onClick={() => setConfirmDelete(o)} className="p-2 bg-slate-50 text-rose-500 rounded-xl hover:bg-rose-500 hover:text-white transition-colors"><IconTrash /></button>
                                    </div>
                                </div>
                                <div className="space-y-1 font-sans font-bold">
                                    {o.items.map((it, i) => (
                                        <div key={i} className="flex justify-between text-xs font-bold font-sans">
                                            <span>{it.name} <span className="opacity-40 uppercase text-[8px]">({it.label})</span> x{it.qty}</span>
                                            {o.type === 'SALE' && <span className="text-slate-800 font-black font-sans">${it.price * it.qty}</span>}
                                        </div>
                                    ))}
                                </div>
                                <div className="bg-slate-50 p-4 rounded-2xl flex justify-between items-end border border-slate-100 shadow-inner font-sans font-bold">
                                    <div className="space-y-1 font-black text-[9px] uppercase text-slate-400 font-sans"><span>經手: {o.staff}</span>{o.notes && <p className="normal-case italic opacity-50 truncate max-w-[150px]">{o.notes}</p>}</div>
                                    {o.type === 'SALE' ? <span className="text-2xl text-indigo-600 font-black tracking-tighter leading-none font-sans">${o.finalPrice}</span> : <span className="text-xs text-emerald-600 uppercase tracking-widest">已完成</span>}
                                </div>
                            </div>
                        ))}
                    </div>

                    {/* 詳細編輯彈窗 */}
                    {editOrder && (
                        <Modal title={`編輯${editOrder.type === 'SALE' ? '銷售' : '進貨'}紀錄`} onClose={() => setEditOrder(null)}>
                            <div className="space-y-6 font-bold text-slate-700">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">交易日期</label>
                                    <input type="date" className="w-full p-4 rounded-xl border bg-slate-50 font-bold" value={editOrder.timestamp?.seconds ? new Date(editOrder.timestamp.seconds * 1000).toISOString().split('T')[0] : ''} onChange={e => {
                                        const d = new Date(e.target.value); d.setHours(12);
                                        setEditOrder({...editOrder, timestamp: firebase.firestore.Timestamp.fromDate(d)});
                                    }} />
                                </div>
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">經手人員</label>
                                    <select className="w-full p-4 rounded-xl border bg-slate-50 font-bold" value={editOrder.staff} onChange={e => setEditOrder({...editOrder, staff: e.target.value})}>{staffs.map(s => <option key={s.id} value={s.name}>{s.name}</option>)}</select>
                                </div>
                                {editOrder.type === 'SALE' && (
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">付款方式</label>
                                        <select className="w-full p-4 rounded-xl border bg-slate-50 font-bold" value={editOrder.payment} onChange={e => setEditOrder({...editOrder, payment: e.target.value})}>{payments.map(p => <option key={p.id} value={p.name}>{p.name}</option>)}</select>
                                    </div>
                                )}
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">修改品項數量</label>
                                    <div className="space-y-2 mt-2">
                                        {editOrder.items.map((it, idx) => (
                                            <div key={idx} className="flex justify-between items-center bg-slate-50 p-3 rounded-xl">
                                                <span className="text-xs truncate max-w-[150px]">{it.name} ({it.label})</span>
                                                <input type="number" inputmode="numeric" className="w-20 p-2 rounded-lg border text-center font-black" value={it.qty} onChange={e => {
                                                    const newItems = [...editOrder.items];
                                                    newItems[idx].qty = Math.max(1, parseInt(e.target.value) || 1);
                                                    setEditOrder({...editOrder, items: newItems});
                                                }} />
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                {editOrder.type === 'SALE' && (
                                    <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">折扣方案</label>
                                        <div className="flex flex-wrap gap-2 mt-2">
                                            {discounts.map(d => {
                                                const isActive = (editOrder.discountIds || []).includes(d.id);
                                                return (
                                                    <button key={d.id} onClick={() => {
                                                        const current = editOrder.discountIds || [];
                                                        const next = isActive ? current.filter(id => id !== d.id) : [...current, d.id];
                                                        setEditOrder({...editOrder, discountIds: next});
                                                    }} className={`px-4 py-2 rounded-xl text-xs font-bold border transition-all ${isActive ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400 border-slate-200'}`}>{d.name}</button>
                                                );
                                            })}
                                        </div>
                                    </div>
                                )}
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest">備註</label><input type="text" className="w-full p-4 rounded-xl border bg-slate-50 font-bold" value={editOrder.notes || ''} onChange={e => setEditOrder({...editOrder, notes: e.target.value})} /></div>
                                {editOrder.type === 'SALE' && (<div className="p-4 bg-indigo-50 rounded-2xl text-center"><p className="text-[10px] text-slate-400 uppercase">重算後預估總額</p><span className="text-2xl font-black text-indigo-700">${calcEditFinal(editOrder)}</span></div>)}
                                <button onClick={handleSaveEdit} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-lg transform active:scale-95 transition-all">確認修改並同步</button>
                            </div>
                        </Modal>
                    )}
                    {confirmDelete && (<ConfirmModal title="徹底刪除紀錄" message="確定要永久移除這筆報表嗎？" onConfirm={handleDelete} onCancel={() => setConfirmDelete(null)} />)}
                </div>
            );
        };

        const SettingsView = ({ staffs, discounts, payments, tags, products, setConfirmState }) => {
            const [productModal, setProductModal] = useState({ open: false, item: null });
            const [editModal, setEditModal] = useState({ open: false, coll: '', item: null });
            const SettingBlock = ({ title, data, coll, icon }) => {
                const [val, setVal] = useState(''); const [num, setNum] = useState(0); const [type, setType] = useState('amount'); const isDiscount = coll === 'settings_discounts';
                const add = async () => { if(!val) return; await getColl(coll).add({ name: val, value: isDiscount ? num : null, type: isDiscount ? type : null, order: data.length }); setVal(''); setNum(0); };
                return (
                    <div className="bg-white p-6 rounded-[2rem] border shadow-sm space-y-4 font-sans font-bold h-full flex flex-col font-sans font-bold">
                        <div className="flex items-center gap-2 mb-2 text-indigo-600 font-black uppercase text-xs tracking-widest font-sans font-bold font-sans font-bold"><h3>{title}</h3></div>
                        <div className="flex-1 overflow-y-auto max-h-[300px] scrollbar-hide">
                            <DraggableList items={data} onSorted={async (list) => { const b = db.batch(); list.forEach((it, i) => b.update(getColl(coll).doc(it.id), { order: i })); await b.commit(); }} renderItem={(it) => (
                                <div key={it.id} className="flex items-center justify-between bg-slate-50 p-3 rounded-2xl border group hover:border-indigo-100 hover:bg-white transition-all mb-2 font-sans font-bold">
                                    <div className="flex items-center gap-2 font-sans font-bold"><div className="drag-handle text-slate-300 transition-colors hover:text-indigo-400 p-1 font-sans font-bold"><IconGrip /></div><span className="text-sm">{it.name} {isDiscount && (it.type === 'percent' ? `(${it.value}%)` : `(-$${it.value})`)}</span></div>
                                    <div className="flex gap-1 opacity-0 group-hover:opacity-100 transition-all font-sans font-bold">
                                        <button onClick={() => setEditModal({ open: true, coll, item: it })} className="p-1.5 text-indigo-400 hover:bg-white rounded-lg shadow-sm border border-transparent hover:border-indigo-100 font-sans font-bold"><IconEdit /></button>
                                        <button onClick={() => setConfirmState({ title: "移除確認", message: "確定刪除嗎？", action: () => getColl(coll).doc(it.id).delete() })} className="p-1.5 text-rose-300 hover:bg-white rounded-lg shadow-sm border font-sans font-bold"><IconTrash /></button>
                                    </div>
                                </div>
                            )} />
                        </div>
                        <div className="flex flex-col gap-2 pt-2 border-t border-slate-50 font-sans font-bold mt-auto font-sans font-bold">
                            <div className="flex gap-2 font-sans font-bold"><input className="flex-1 p-3 rounded-xl border bg-slate-50 text-sm font-bold outline-none shadow-inner font-sans font-bold" placeholder="名稱..." value={val} onChange={e => setVal(e.target.value)} />{isDiscount && (<select className="p-3 rounded-xl border bg-slate-50 text-xs font-bold" value={type} onChange={e => setType(e.target.value)}><option value="amount">金額</option><option value="percent">%</option></select>)}</div>
                            <div className="flex gap-2 font-sans font-bold"><input type="number" inputmode="numeric" className="flex-1 p-3 rounded-xl border bg-slate-50 text-sm font-bold outline-none shadow-inner" value={num} onChange={e => setNum(parseInt(e.target.value) || 0)} /><button onClick={add} className="bg-indigo-600 text-white px-4 rounded-xl shadow-md font-sans active:scale-90 transition-transform"><i data-lucide="plus" className="w-5 h-5 font-sans font-black"></i></button></div>
                        </div>
                    </div>
                );
            };

            return (
                <div className="p-4 lg:p-8 space-y-8 pb-20 scrollbar-hide overflow-y-auto h-full font-sans font-bold">
                    <div className="flex justify-between items-center"><h2 className="text-2xl text-slate-800 font-sans font-bold">系統管理中心</h2><button onClick={() => setProductModal({ open: true, item: null })} className="bg-indigo-600 text-white px-6 py-4 rounded-[2rem] font-black flex items-center gap-2 shadow-xl hover:bg-indigo-700 transition-all scale-105 active:scale-95 uppercase tracking-widest font-sans font-bold"><i data-lucide="plus" className="w-6 h-6 font-sans font-bold"></i>新增商品檔案</button></div>
                    <div className="bg-white rounded-[2rem] border shadow-sm overflow-hidden font-sans font-bold">
                        <table className="w-full text-left border-collapse font-sans font-bold">
                            <thead className="bg-slate-50/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b font-sans font-bold"><tr><th className="px-6 py-5 w-16 text-center font-sans">排序</th><th className="px-6 py-5 font-sans font-bold">名稱</th><th className="px-6 py-5 font-sans font-bold">條碼</th><th className="px-6 py-5 font-sans font-bold text-right">操作</th></tr></thead>
                            <DraggableList component="tbody" items={products} onSorted={async (list) => { const b = db.batch(); list.forEach((p, i) => b.update(getColl('products').doc(p.id), { order: i })); await b.commit(); }} renderItem={(p) => (
                                <tr key={p.id} className="hover:bg-slate-50 group border-b transition-colors font-sans font-bold">
                                    <td className="px-6 py-5 text-center font-sans font-bold"><div className="drag-handle text-slate-300 hover:text-indigo-400 p-2 inline-block font-sans font-bold"><IconGrip /></div></td>
                                    <td className="px-6 py-5 font-black text-slate-700 font-sans font-bold">{p.name}</td>
                                    <td className="px-6 py-5 font-mono text-xs font-black text-slate-400 uppercase tracking-widest font-sans font-bold">{p.barcode || '-'}</td>
                                    <td className="px-6 py-5 text-right font-sans font-bold"><div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-all font-sans font-bold"><button onClick={() => setProductModal({ open: true, item: p })} className="p-2 text-indigo-400 hover:bg-white rounded-xl shadow-sm border font-sans font-bold"><IconEdit /></button><button onClick={() => { getColl('products').doc(p.id).delete(); getColl('inventory').doc(p.id).delete(); }} className="p-2 text-rose-300 hover:bg-white hover:text-rose-500 rounded-xl shadow-sm border font-sans font-bold"><IconTrash /></button></div></td>
                                </tr>
                            )} />
                        </table>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6 pb-20 font-sans font-bold">
                        <SettingBlock title="服務人員列表" data={staffs} coll="settings_staff" icon="users" />
                        <SettingBlock title="支付方式管理" data={payments} coll="settings_payments" icon="credit-card" />
                        <SettingBlock title="折扣方案中心" data={discounts} coll="settings_discounts" icon="percent" />
                        <SettingBlock title="分類標籤標註" data={tags} coll="settings_tags" icon="tag" />
                    </div>
                    {productModal.open && <ProductEditor tags={tags} productToEdit={productModal.item} onClose={() => setProductModal({ open: false, item: null })} />}
                    {editModal.open && (
                        <Modal title="快速編輯" onClose={() => setEditModal({ open: false, coll: '', item: null })}>
                            <div className="space-y-4 font-sans font-black font-bold font-sans font-bold">
                                <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">顯示名稱</label><input type="text" className="w-full p-4 rounded-xl border bg-slate-50 outline-none shadow-inner font-sans font-black font-bold" value={editModal.item.name} onChange={e => setEditModal({...editModal, item: {...editModal.item, name: e.target.value}})} /></div>
                                {editModal.coll === 'settings_discounts' && (
                                    <div className="grid grid-cols-2 gap-4 font-sans font-bold">
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">類型</label><select className="w-full p-4 rounded-xl border bg-slate-50 outline-none font-sans font-black font-bold" value={editModal.item.type} onChange={e => setEditModal({...editModal, item: {...editModal.item, type: e.target.value}})}><option value="amount">金額</option><option value="percent">%</option></select></div>
                                        <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">數值</label><input type="number" inputmode="numeric" className="w-full p-4 rounded-xl border bg-slate-50 outline-none font-sans font-black font-bold" value={editModal.item.value} onChange={e => setEditModal({...editModal, item: {...editModal.item, value: parseInt(e.target.value) || 0}})} /></div>
                                    </div>
                                )}
                                <button onClick={async () => { await getColl(editModal.coll).doc(editModal.item.id).update(editModal.item); setEditModal({ open: false, coll: '', item: null }); }} className="w-full py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl hover:bg-indigo-700 font-sans tracking-widest uppercase font-bold font-sans font-bold">儲存</button>
                            </div>
                        </Modal>
                    )}
                </div>
            );
        };

        const ProductEditor = ({ tags, productToEdit, onClose }) => {
            const [name, setName] = useState(productToEdit?.name || '');
            const [barcode, setBarcode] = useState(productToEdit?.barcode || '');
            const [imageUrl, setImageUrl] = useState(productToEdit?.imageUrl || ''); 
            const [options, setOptions] = useState(productToEdit?.options || [{ label: '原價', price: 0 }]);
            const [selTags, setSelTags] = useState(productToEdit?.tags || []);
            const [isSaving, setIsSaving] = useState(false);
            const save = async () => { if (!name) return; setIsSaving(true); const data = { name, barcode, imageUrl, options, tags: selTags, updatedAt: firebase.firestore.FieldValue.serverTimestamp() }; if (productToEdit) { await getColl('products').doc(productToEdit.id).update(data); } else { const ref = getColl('products').doc(); data.order = 999; await ref.set(data); await getColl('inventory').doc(ref.id).set({ count: 0 }); } onClose(); };
            return (
                <Modal title={productToEdit ? "修改資料" : "建立新品"} onClose={onClose} wide={true}>
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-10 font-bold text-slate-800 font-sans font-bold">
                        <div className="space-y-4 font-sans font-bold">
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">名稱</label><input type="text" className="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-bold" value={name} onChange={e => setName(e.target.value)} /></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">條碼</label><input type="text" className="w-full p-4 rounded-2xl border bg-slate-50 outline-none font-mono font-black shadow-inner" value={barcode} onChange={e => setBarcode(e.target.value)} /></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest text-indigo-600 font-black">圖片網址</label><input type="text" className="w-full p-4 rounded-2xl border bg-indigo-50/30 outline-none font-black border-indigo-100 font-sans font-bold" placeholder="https://..." value={imageUrl} onChange={e => setImageUrl(e.target.value)} /></div>
                            <div><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">標籤</label><div className="flex flex-wrap gap-2 mt-2 font-sans font-bold">{tags.map(t => <button key={t.id} onClick={() => selTags.includes(t.name) ? setSelTags(selTags.filter(x => x !== t.name)) : setSelTags([...selTags, t.name])} className={`px-3 py-1.5 rounded-xl text-[10px] border transition-all font-black uppercase font-sans font-bold ${selTags.includes(t.name) ? 'bg-indigo-600 text-white shadow-md' : 'bg-white text-slate-400'}`}>{t.name}</button>)}</div></div>
                        </div>
                        <div className="space-y-4 font-sans font-bold">
                            <div className="flex justify-between items-center font-sans font-bold"><label className="text-[10px] font-black text-slate-400 uppercase tracking-widest font-sans font-bold">定價清單</label><button onClick={() => setOptions([...options, {label: '', price: 0}])} className="text-xs text-indigo-600 font-black hover:underline uppercase tracking-widest">+ 新增</button></div>
                            <div className="space-y-2 max-h-[250px] overflow-y-auto pr-2 scrollbar-hide font-sans font-bold">
                                {options.map((opt, i) => (
                                    <div key={i} className="flex gap-2 font-sans font-bold"><input type="text" className="flex-1 p-3 rounded-2xl border bg-slate-50 outline-none text-sm font-bold" placeholder="..." value={opt.label} onChange={e => { const n = [...options]; n[i].label = e.target.value; setOptions(n); }} /><input type="number" inputmode="numeric" className="w-24 p-3 rounded-2xl border bg-slate-50 outline-none text-sm font-bold" placeholder="..." value={opt.price} onChange={e => { const n = [...options]; n[i].price = parseInt(e.target.value) || 0; setOptions(n); }} /></div>
                                ))}
                            </div>
                            <button disabled={isSaving} onClick={save} className="w-full py-5 bg-indigo-600 text-white rounded-[2rem] font-black shadow-xl hover:bg-indigo-700 font-sans font-bold tracking-widest uppercase">{isSaving ? '正在存檔...' : '確認儲存'}</button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const App = () => {
            const [view, setView] = useState('sales');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);
            const [dbError, setDbError] = useState(null);
            const [confirmState, setConfirmState] = useState(null);
            const [products, setProducts] = useState([]);
            const [inventory, setInventory] = useState({});
            const [staffs, setStaffs] = useState([]);
            const [discounts, setDiscounts] = useState([]);
            const [payments, setPayments] = useState([]);
            const [tags, setTags] = useState([]);
            const [cart, setCart] = useState([]);

            useEffect(() => {
                const initAuth = async () => {
                    try { await auth.signInAnonymously(); } catch (err) {
                        if (err.message?.includes('CONFIGURATION_NOT_FOUND')) setAuthError("連線異常。");
                        else setAuthError(`連線錯誤: ${err.message}`);
                    } finally { setLoading(false); }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => { setUser(u); if(u) lucide.createIcons(); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user) return;
                const logErr = (name) => (err) => { if (err.message?.includes('database (default) does not exist')) setDbError("資料庫尚未建立。"); };
                const unsubs = [
                    getColl('products').onSnapshot(s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0))), logErr('產品資料')),
                    getColl('inventory').onSnapshot(s => { const i = {}; s.docs.forEach(d => i[d.id] = d.data().count||0); setInventory(i); }),
                    getColl('settings_staff').onSnapshot(s => setStaffs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_payments').onSnapshot(s => setPayments(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_tags').onSnapshot(s => setTags(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_discounts').onSnapshot(s => setDiscounts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            useEffect(() => { if (!loading) lucide.createIcons(); }, [view, loading, cart]);

            if (authError || dbError) return (<div className="h-screen flex items-center justify-center p-8 bg-slate-50 font-sans font-bold"><div className="max-w-md w-full bg-white p-12 rounded-[3rem] shadow-2xl border-t-8 border-rose-500 text-center space-y-8 animate-in font-sans font-bold"><div className="w-24 h-24 bg-rose-50 text-rose-500 rounded-full flex items-center justify-center mx-auto shadow-sm font-sans font-bold"><i data-lucide="shield-alert" className="w-12 h-12 font-sans font-bold"></i></div><h2 className="text-3xl font-black text-slate-800 tracking-tighter">系統未連接</h2><p className="text-slate-500 font-bold">{authError || dbError}</p><a href="https://console.firebase.google.com/" target="_blank" className="inline-block px-10 py-5 bg-indigo-600 text-white rounded-2xl font-black shadow-xl font-sans font-bold">前往設定頁面</a></div></div>);
            if (loading) return (<div className="fixed inset-0 flex items-center justify-center bg-white z-50 text-center animate-pulse font-sans font-bold"><div className="space-y-6 font-sans font-bold"><div className="animate-spin rounded-full h-16 w-16 border-b-4 border-indigo-600 mx-auto font-sans font-bold"></div><p className="text-slate-400 font-black tracking-widest uppercase text-[10px] font-sans font-bold">正在同步雲端安全數據...</p></div></div>);

            return (
                <div className="min-h-screen h-screen flex flex-col md:flex-row bg-slate-50 text-slate-800 overflow-hidden font-sans font-bold">
                    <nav className="fixed bottom-0 left-0 right-0 md:relative md:w-20 lg:w-64 bg-white border-t md:border-t-0 md:border-r z-40 flex md:flex-col items-center py-2 md:py-8 shadow-2xl md:shadow-none font-sans font-bold">
                        <div className="hidden lg:block mb-10 px-6 w-full text-center font-black font-sans font-bold font-sans font-bold"><h1 className="text-2xl text-indigo-600 tracking-tighter leading-none mb-1 font-sans font-bold">SILK POS</h1><p className="text-[10px] text-slate-400 uppercase tracking-widest font-sans font-bold font-black">Enterprise V2.5 Pro</p></div>
                        <div className="flex flex-row md:flex-col w-full justify-around md:justify-start md:space-y-4 px-2 font-sans font-bold font-sans font-bold">
                            {[{id:'sales',icon:'shopping-cart',label:'銷售'},{id:'inventory',icon:'package',label:'庫存'},{id:'history',icon:'history',label:'報表'},{id:'settings',icon:'settings',label:'設定'}].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col lg:flex-row items-center lg:space-x-4 p-3 lg:px-6 lg:w-[90%] mx-auto rounded-[1.5rem] transition-all duration-300 ${view === item.id ? 'bg-indigo-600 text-white shadow-xl shadow-indigo-100 scale-105 font-black font-bold' : 'text-slate-400 hover:bg-slate-50'} font-sans font-bold`} >
                                    <i data-lucide={item.icon} className="w-6 h-6 font-sans font-bold"></i><span className="text-[10px] lg:text-base font-black mt-1 lg:mt-0 tracking-tighter uppercase font-sans font-bold">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                    <main className="flex-1 pb-20 md:pb-0 overflow-hidden h-full font-sans font-bold">
                        {view === 'sales' && <SalesView products={products} inventory={inventory} cart={cart} setCart={setCart} staffs={staffs} discounts={discounts} payments={payments} tags={tags} />}
                        {view === 'inventory' && <InventoryView products={products} inventory={inventory} tags={tags} staffs={staffs} payments={payments} />}
                        {view === 'history' && <HistoryView staffs={staffs} payments={payments} discounts={discounts} />}
                        {view === 'settings' && <SettingsView staffs={staffs} discounts={discounts} payments={payments} tags={tags} products={products} setConfirmState={setConfirmState} />}
                    </main>
                    {confirmState && (<ConfirmModal title={confirmState.title} message={confirmState.message} onConfirm={() => { confirmState.action(); setConfirmState(null); }} onCancel={() => setConfirmState(null)} />)}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>

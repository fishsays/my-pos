<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>流光行動 POS 系統</title>
    
    <!-- iOS 網頁 App 設定 -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SILK POS">
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/9425/9425114.png">

    <!-- 外部資源庫 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://unpkg.com/lucide@0.263.0"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    
    <!-- Firebase SDK (v8 Compat) -->
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f8fafc; overscroll-behavior: none; }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .drag-handle { cursor: grab; }
        .sortable-ghost { opacity: 0.4; background-color: #e0e7ff !important; }
        @media (display-mode: standalone) { nav { padding-top: 24px; } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        // ========================================================
        // ⚠️ 第三階段：請確認下方的配置與您在 Firebase Console 看到的一致
        // ========================================================
        const firebaseConfig = {
            apiKey: "AIzaSyDKj0O-cN9e4qQ0f7LTxNRutOjB-LUX5qk",
            authDomain: "my-pos-be7b2.firebaseapp.com",
            projectId: "my-pos-be7b2",
            storageBucket: "my-pos-be7b2.firebasestorage.app",
            messagingSenderId: "499859190156",
            appId: "1:499859190156:web:bcd8dbce13055b6c1e26a9",
            measurementId: "G-G76PVXEXPB"
        };
        
        const appId = 'pos-pro-v2-main';

        const isConfigured = firebaseConfig.apiKey && firebaseConfig.apiKey !== "在此貼上你的 API Key";
        if (isConfigured && !firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }

        const db = isConfigured ? firebase.firestore() : null;
        const auth = isConfigured ? firebase.auth() : null;
        
        const getColl = (name) => {
            if (!db) return null;
            return db.collection('artifacts').doc(appId).collection('public').doc('data').collection(name);
        };

        // --- 核心工具與組件 ---
        const IconEdit = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17 3a2.828 2.828 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5L17 3z"></path></svg>);
        const IconTrash = () => (<svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path><line x1="10" y1="11" x2="10" y2="17"></line><line x1="14" y1="11" x2="14" y2="17"></line></svg>);
        const IconGrip = () => (<svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="9" cy="12" r="1"></circle><circle cx="9" cy="5" r="1"></circle><circle cx="9" cy="19" r="1"></circle><circle cx="15" cy="12" r="1"></circle><circle cx="15" cy="5" r="1"></circle><circle cx="15" cy="19" r="1"></circle></svg>);

        const Modal = ({ title, children, onClose, wide = false }) => {
            useEffect(() => { const t = setTimeout(() => { if (window.lucide) lucide.createIcons(); }, 100); return () => clearTimeout(t); }, []);
            return (
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/40 backdrop-blur-sm">
                    <div className={`bg-white rounded-3xl shadow-2xl w-full ${wide ? 'max-w-4xl' : 'max-w-lg'} overflow-hidden flex flex-col max-h-[90vh]`}>
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50"><h3 className="text-xl font-bold text-slate-700">{title}</h3><button onClick={onClose} className="p-2 hover:bg-slate-200 rounded-full text-slate-400"><i data-lucide="x" className="w-6 h-6"></i></button></div>
                        <div className="p-6 overflow-y-auto flex-1">{children}</div>
                    </div>
                </div>
            );
        };

        const DraggableList = ({ items, onSorted, renderItem, component: Component = 'div', className = "" }) => {
            const listRef = useRef(null);
            useEffect(() => {
                if (!listRef.current || items.length === 0) return;
                const sortable = Sortable.create(listRef.current, { animation: 150, ghostClass: 'sortable-ghost', handle: '.drag-handle', onEnd: (evt) => {
                    const { oldIndex, newIndex } = evt; if (oldIndex === newIndex) return;
                    const newItems = [...items]; const [moved] = newItems.splice(oldIndex, 1); newItems.splice(newIndex, 0, moved);
                    onSorted(newItems);
                }});
                return () => sortable.destroy();
            }, [items, onSorted]);
            return <Component ref={listRef} className={className}>{items.map((item, idx) => renderItem(item, idx))}</Component>;
        };

        // --- 視圖邏輯 ---
        const SalesView = ({ products, inventory, cart, setCart, staffs, discounts, payments, tags }) => {
            const [search, setSearch] = useState('');
            const [barcodeInput, setBarcodeInput] = useState('');
            const [selectedTag, setSelectedTag] = useState('全部');
            const [showCheckout, setShowCheckout] = useState(false);
            const [priceModal, setPriceModal] = useState(null);
            const barcodeInputRef = useRef(null);

            const filtered = useMemo(() => products.filter(p => (p.name.toLowerCase().includes(search.toLowerCase()) || (p.barcode || '').includes(search)) && (selectedTag === '全部' || p.tags?.includes(selectedTag))), [products, search, selectedTag]);
            const subtotal = cart.reduce((acc, item) => acc + (item.price * item.qty), 0);

            const addToCart = (product, option) => {
                const cartId = `${product.id}-${option.label}`;
                const existing = cart.find(item => item.cartId === cartId);
                if (existing) setCart(cart.map(item => item.cartId === cartId ? {...item, qty: item.qty + 1} : item));
                else setCart([...cart, { ...product, ...option, qty: 1, cartId }]);
                setPriceModal(null); setBarcodeInput(''); setTimeout(() => barcodeInputRef.current?.focus(), 100);
            };

            return (
                <div className="h-full flex flex-col lg:flex-row">
                    <div className="flex-1 flex flex-col p-4 lg:p-8 space-y-6">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            <div className="relative"><i data-lucide="search" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-slate-400"></i><input type="text" placeholder="關鍵字搜尋..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-none ring-1 ring-slate-200 focus:ring-2 focus:ring-indigo-500 shadow-sm outline-none" value={search} onChange={e => setSearch(e.target.value)} /></div>
                            <div className="relative"><i data-lucide="barcode" className="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-indigo-500"></i><input ref={barcodeInputRef} type="text" placeholder="條碼掃描區..." className="w-full pl-12 pr-4 py-4 rounded-2xl border-2 border-indigo-100 bg-indigo-50/30 focus:border-indigo-500 font-bold outline-none" value={barcodeInput} onChange={e => setBarcodeInput(e.target.value)} onKeyDown={e => {
                                if (e.key === 'Enter') {
                                    const p = products.find(x => x.barcode === barcodeInput.trim());
                                    if (p) p.options.length === 1 ? addToCart(p, p.options[0]) : setPriceModal(p);
                                    setBarcodeInput('');
                                }
                            }} autoFocus /></div>
                        </div>
                        <div className="flex overflow-x-auto space-x-2 pb-2 scrollbar-hide">
                            <button onClick={() => setSelectedTag('全部')} className={`px-5 py-2 rounded-full shrink-0 transition-all ${selectedTag === '全部' ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border'}`}>全部</button>
                            {tags.map(t => <button key={t.id} onClick={() => setSelectedTag(t.name)} className={`px-5 py-2 rounded-full shrink-0 transition-all ${selectedTag === t.name ? 'bg-indigo-600 text-white' : 'bg-white text-slate-500 border'}`}>{t.name}</button>)}
                        </div>
                        <div className="grid grid-cols-2 sm:grid-cols-3 xl:grid-cols-4 gap-4 overflow-y-auto">
                            {filtered.map(p => (
                                <div key={p.id} onClick={() => setPriceModal(p)} className="bg-white p-4 rounded-3xl border shadow-sm hover:shadow-md transition-all cursor-pointer group flex flex-col">
                                    <div className="w-full aspect-square rounded-2xl overflow-hidden bg-slate-100 mb-3">{p.imageUrl ? <img src={p.imageUrl} className="w-full h-full object-cover" /> : <div className="w-full h-full flex items-center justify-center text-slate-300"><i data-lucide="image" className="w-8 h-8"></i></div>}</div>
                                    <div className="flex-1 flex flex-col justify-between">
                                        <div><div className="flex justify-between items-center mb-1"><span className="text-[10px] text-slate-400">{p.barcode || '無碼'}</span><span className={`text-[10px] font-bold ${inventory[p.id] < 5 ? 'text-rose-500' : 'text-indigo-500'}`}>庫存: {inventory[p.id] || 0}</span></div><h4 className="font-bold text-slate-700 line-clamp-1">{p.name}</h4></div>
                                        <div className="flex justify-between items-end mt-2"><div className="font-bold text-lg text-indigo-600">${p.options?.[0]?.price}</div><div className="bg-slate-100 p-1.5 rounded-xl group-hover:bg-indigo-600 group-hover:text-white transition-colors"><i data-lucide="plus" className="w-4 h-4"></i></div></div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>
                    <div className="w-full lg:w-96 bg-white border-l flex flex-col shadow-2xl">
                        <div className="p-6 border-b flex justify-between items-center bg-slate-50/50"><h2 className="text-xl font-bold flex items-center text-slate-800"><i data-lucide="shopping-bag" className="w-5 h-5 mr-2 text-indigo-600"></i>購物清單</h2><button onClick={() => setCart([])} className="text-xs text-rose-500">清空</button></div>
                        <div className="flex-1 overflow-y-auto p-4 space-y-4">
                            {cart.length === 0 ? <div className="h-full flex flex-col items-center justify-center text-slate-300 space-y-4 p-8 text-center"><i data-lucide="shopping-cart" className="w-16 h-16"></i><p>尚未選擇商品</p></div> : 
                            cart.map(item => (
                                <div key={item.cartId} className="flex items-center space-x-4 bg-slate-50 p-4 rounded-2xl">
                                    <div className="flex-1"><p className="font-bold text-slate-700">{item.name}</p><p className="text-xs text-slate-400">{item.label}</p><p className="text-indigo-600 font-bold mt-1">${item.price}</p></div>
                                    <div className="flex items-center bg-white rounded-xl border p-1">
                                        <button onClick={() => item.qty > 1 ? setCart(cart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty - 1} : c)) : setCart(cart.filter(c => c.cartId !== item.cartId))} className="p-1 text-rose-400 hover:bg-rose-50 rounded-lg"><i data-lucide="minus" className="w-5 h-5"></i></button>
                                        <span className="w-8 text-center font-bold">{item.qty}</span>
                                        <button onClick={() => setCart(cart.map(c => c.cartId === item.cartId ? {...c, qty: c.qty + 1} : c))} className="p-1 text-emerald-400 hover:bg-emerald-50 rounded-lg"><i data-lucide="plus" className="w-5 h-5"></i></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="p-6 border-t bg-slate-50 space-y-4"><div className="flex justify-between items-center"><span className="text-slate-500 font-bold">總金額</span><span className="font-black text-3xl text-slate-800">${subtotal}</span></div><button disabled={cart.length === 0} onClick={() => setShowCheckout(true)} className="w-full bg-indigo-600 text-white py-5 rounded-2xl font-bold text-lg shadow-lg hover:bg-indigo-700 disabled:opacity-50">確認結帳</button></div>
                    </div>
                    {priceModal && (<Modal title={`選擇規格 - ${priceModal.name}`} onClose={() => setPriceModal(null)}><div className="space-y-2">{priceModal.options.map((opt, i) => (<button key={i} onClick={() => addToCart(priceModal, opt)} className="w-full flex justify-between items-center p-5 bg-slate-50 hover:bg-indigo-50 border rounded-2xl transition-all"><span className="font-bold text-slate-700">{opt.label}</span><span className="text-indigo-600 font-black">${opt.price}</span></button>))}</div></Modal>)}
                    {showCheckout && <CheckoutModal cart={cart} subtotal={subtotal} staffs={staffs} discounts={discounts} payments={payments} onClose={() => setShowCheckout(false)} onSuccess={() => { setShowCheckout(false); setCart([]); }} />}
                </div>
            );
        };

        // --- 其餘組件 (InventoryView, SettingsView 等) 與主程式保持相同 ---
        // (此處為了上線後的程式碼完整度，包含 App 入口邏輯)

        const App = () => {
            const [view, setView] = useState('sales');
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);
            const [authError, setAuthError] = useState(null);

            const [products, setProducts] = useState([]);
            const [inventory, setInventory] = useState({});
            const [staffs, setStaffs] = useState([]);
            const [discounts, setDiscounts] = useState([]);
            const [payments, setPayments] = useState([]);
            const [tags, setTags] = useState([]);
            const [cart, setCart] = useState([]);

            useEffect(() => {
                if (!isConfigured) { setLoading(false); return; }
                const initAuth = async () => {
                    try {
                        await auth.signInAnonymously();
                    } catch (err) {
                        if (err.code === 'auth/operation-not-allowed' || err.message?.includes('CONFIGURATION_NOT_FOUND')) {
                            setAuthError("身分驗證尚未開啟：請前往 Firebase -> Build -> Authentication -> Sign-in method 啟用 'Anonymous'。");
                        } else { setAuthError(`連線錯誤: ${err.message}`); }
                    } finally { setLoading(false); }
                };
                initAuth();
                const unsubAuth = auth.onAuthStateChanged(u => { setUser(u); if(u) lucide.createIcons(); });
                return () => unsubAuth();
            }, []);

            useEffect(() => {
                if (!user || !db) return;
                const unsubs = [
                    getColl('products').onSnapshot(s => setProducts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('inventory').onSnapshot(s => { const i = {}; s.docs.forEach(d => i[d.id] = d.data().count||0); setInventory(i); }),
                    getColl('settings_staff').onSnapshot(s => setStaffs(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_payments').onSnapshot(s => setPayments(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_tags').onSnapshot(s => setTags(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                    getColl('settings_discounts').onSnapshot(s => setDiscounts(s.docs.map(d => ({id: d.id, ...d.data()})).sort((a,b) => (a.order||0)-(b.order||0)))),
                ];
                return () => unsubs.forEach(u => u());
            }, [user]);

            useEffect(() => { if (!loading) lucide.createIcons(); }, [view, loading, cart]);

            if (authError) return (<div className="h-screen flex items-center justify-center p-8 bg-slate-50"><div className="max-w-md w-full bg-white p-10 rounded-[2.5rem] shadow-xl text-center border-t-8 border-rose-500"><h2 className="text-2xl font-bold mb-4">系統配置錯誤</h2><p className="text-slate-600 mb-8 text-sm">{authError}</p><a href="https://console.firebase.google.com/" target="_blank" className="bg-indigo-600 text-white px-6 py-3 rounded-xl font-bold">前往 Firebase</a></div></div>);
            if (!isConfigured) return (<div className="h-screen flex items-center justify-center p-8 bg-slate-50"><div className="max-w-sm bg-white p-10 rounded-[2.5rem] shadow-xl text-center border-t-8 border-indigo-500"><h2 className="text-2xl font-bold mb-4">歡迎使用 POS</h2><p className="text-slate-500 mb-6 text-sm">請在代碼中填入 Firebase API 金鑰。</p></div></div>);
            if (loading) return (<div className="fixed inset-0 flex items-center justify-center bg-white z-50 text-center"><div className="animate-spin rounded-full h-12 w-12 border-b-2 border-indigo-500 mx-auto mb-4"></div><p className="text-slate-400 font-bold">載入中...</p></div>);

            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-slate-50 text-slate-800">
                    <nav className="fixed bottom-0 left-0 right-0 md:relative md:w-20 lg:w-64 bg-white border-t md:border-t-0 md:border-r z-40 flex md:flex-col items-center py-2 md:py-8 shadow-2xl md:shadow-none">
                        <div className="hidden lg:block mb-10 px-6 w-full text-center"><h1 className="text-2xl font-black text-indigo-600 tracking-tighter">SILK POS</h1><p className="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Advanced v2</p></div>
                        <div className="flex flex-row md:flex-col w-full justify-around md:justify-start md:space-y-4 px-2">
                            {[{ id: 'sales', icon: 'shopping-cart', label: '銷售前台' }, { id: 'inventory', icon: 'package', label: '庫存管理' }].map(item => (
                                <button key={item.id} onClick={() => setView(item.id)} className={`flex flex-col lg:flex-row items-center lg:space-x-4 p-3 lg:px-6 lg:w-[90%] mx-auto rounded-2xl transition-all ${view === item.id ? 'bg-indigo-600 text-white shadow-lg' : 'text-slate-400 hover:bg-slate-50'}`} >
                                    <i data-lucide={item.icon} className="w-6 h-6"></i><span className="text-[10px] lg:text-base font-bold mt-1 lg:mt-0">{item.label}</span>
                                </button>
                            ))}
                        </div>
                    </nav>
                    <main className="flex-1 pb-20 md:pb-0 overflow-y-auto max-h-screen scrollbar-hide">
                        {view === 'sales' && <SalesView products={products} inventory={inventory} cart={cart} setCart={setCart} staffs={staffs} discounts={discounts} payments={payments} tags={tags} />}
                        {/* 此處可以繼續加入 InventoryView 與 SettingsView */}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
